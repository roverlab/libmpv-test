name: Build libmpv for iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # 缓存 key — 版本号变更时自动失效
  FFMPEG_CACHE_KEY: "ffmpeg-v8.1-ios-static"
  MOLTENVK_CACHE_KEY: "moltenvk-v1-ios-static"

jobs:
  # =========================================================================
  # Job 0: 编译 MoltenVK (device + simulator) 并缓存
  # =========================================================================
  build-moltenvk:
    name: Build MoltenVK (${{ matrix.environment }})
    runs-on: macos-latest
    strategy:
      matrix:
        environment: [distribution, simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 检查 MoltenVK 编译产物缓存
      - id: cache-moltenvk
        uses: actions/cache@v4
        with:
          path: |
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/libMoltenVK.a
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/pkgconfig/vulkan.pc
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/include/MoltenVK/
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/include/vulkan/
          key: ${{ env.MOLTENVK_CACHE_KEY }}-${{ matrix.environment }}-${{ runner.os }}

      - name: Setup Xcode
        if: steps.cache-moltenvk.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-moltenvk.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install meson
          brew install python@3.13

      - name: Make build scripts executable
        if: steps.cache-moltenvk.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/*.sh scripts/components/*.sh

      - name: Build MoltenVK
        if: steps.cache-moltenvk.outputs.cache-hit != 'true'
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          ARCH: arm64
          SCRATCH: ${{ github.workspace }}/scratch
          SRC: ${{ github.workspace }}/src
          ROOT: ${{ github.workspace }}
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          mkdir -p "scratch/$ARCH_DIR"
          
          # 设置 SDK 路径
          if [ "${{ matrix.environment }}" = "simulator" ]; then
            export SDKPATH="$(xcodebuild -sdk iphonesimulator -version Path)"
          else
            export SDKPATH="$(xcodebuild -sdk iphoneos -version Path)"
          fi
          
          echo "=== Building MoltenVK for ${{ matrix.environment }} ==="
          ./scripts/components/moltenvk-build.sh

      - name: Verify MoltenVK build
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== MoltenVK for ${{ matrix.environment }} ==="
          ls -la scratch/$ARCH_DIR/lib/libMoltenVK.a
          ls -la scratch/$ARCH_DIR/lib/pkgconfig/vulkan.pc

      - name: Upload MoltenVK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moltenvk-${{ matrix.environment }}
          path: |
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/libMoltenVK.a
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/pkgconfig/vulkan.pc
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/include/MoltenVK/
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/include/vulkan/
          retention-days: 1

  # =========================================================================
  # Job 1: 编译 FFmpeg (device + simulator) 并缓存
  # =========================================================================
  build-ffmpeg:
    name: Build FFmpeg (${{ matrix.environment }})
    runs-on: macos-latest
    strategy:
      matrix:
        environment: [distribution, simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 检查 FFmpeg 编译产物缓存
      - id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/
          key: ${{ env.FFMPEG_CACHE_KEY }}-${{ matrix.environment }}-${{ runner.os }}

      - name: Setup Xcode
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Make build scripts executable
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/*.sh scripts/components/*.sh

      - name: Build dav1d (AV1 decoder)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "=== Building dav1d for ${{ matrix.environment }} (cache miss) ==="
          ./scripts/build.sh -e ${{ matrix.environment }} -s 0

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "=== Building FFmpeg for ${{ matrix.environment }} (cache miss) ==="
          ./scripts/build.sh -e ${{ matrix.environment }} -s 1

      - name: Verify FFmpeg build
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== FFmpeg libraries for ${{ matrix.environment }} ==="
          ls -la scratch/$ARCH_DIR/lib/libav*.a scratch/$ARCH_DIR/lib/libsw*.a scratch/$ARCH_DIR/lib/libpostproc.a 2>/dev/null || true

      - name: Upload FFmpeg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.environment }}
          path: |
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/include/
          retention-days: 1

  # =========================================================================
  # Job 2: 编译 libmpv (device + simulator)
  # =========================================================================
  build-libmpv:
    name: Build libmpv (${{ matrix.environment }})
    runs-on: macos-latest
    needs: [build-ffmpeg, build-moltenvk]
    strategy:
      matrix:
        environment: [distribution, simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Make build scripts executable
        run: |
          chmod +x scripts/*.sh scripts/components/*.sh

      # 下载 FFmpeg artifacts
      - name: Download FFmpeg artifact
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-${{ matrix.environment }}
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/

      # 下载 MoltenVK artifacts
      - name: Download MoltenVK artifact
        uses: actions/download-artifact@v4
        with:
          name: moltenvk-${{ matrix.environment }}
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/

      - name: Verify dependencies
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== FFmpeg libraries ==="
          ls -la scratch/$ARCH_DIR/lib/libav*.a scratch/$ARCH_DIR/lib/libsw*.a 2>/dev/null || echo "No FFmpeg libs"
          echo "=== MoltenVK ==="
          ls -la scratch/$ARCH_DIR/lib/libMoltenVK.a 2>/dev/null || echo "No MoltenVK"

      - name: Build libmpv (+ subprojects)
        run: |
          echo "=== Building libmpv for ${{ matrix.environment }} (arm64) ==="
          echo "    Subprojects: libass, freetype2, harfbuzz, fribidi, libplacebo"
          ./scripts/build.sh -e ${{ matrix.environment }} -s 2

      - name: Verify build
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== ${{ matrix.environment }} build results ==="
          ls -la scratch/$ARCH_DIR/lib/
          ls -la scratch/$ARCH_DIR/lib/libmpv.a

      - name: Upload libmpv artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-${{ matrix.environment }}
          path: |
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/
            ${{ matrix.environment == 'distribution' && 'scratch/arm64/include/' || '' }}
          retention-days: 1

  # =========================================================================
  # Job 3: 创建 XCFramework 并验证
  # =========================================================================
  create-xcframework:
    name: Create XCFramework
    runs-on: macos-latest
    needs: build-libmpv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download device artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-distribution
          path: scratch/arm64/

      - name: Download simulator artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-simulator
          path: scratch/arm64-simulator/lib/

      - name: Verify artifacts
        run: |
          echo "=== Device libraries ==="
          ls -la scratch/arm64/lib/
          echo "=== Simulator libraries ==="
          ls -la scratch/arm64-simulator/lib/
          echo "=== Headers ==="
          ls -la scratch/arm64/include/mpv/

      - name: Create fat libraries
        run: |
          # Helper function to create fat library for a given architecture
          create_fat_lib() {
              local arch_dir="$1"
              local output_dir="$2"
              local label="$3"

              echo "=== Creating ${label} fat library ==="
              mkdir -p "$output_dir"

              # Collect all .a files
              ALL_LIBS=$(ls "${arch_dir}"lib/*.a)
              echo "All libs to merge:$ALL_LIBS"

              libtool -static -o "${output_dir}/libmpv_full.a" $ALL_LIBS

              echo "${label} fat library size:"
              ls -lh "${output_dir}/libmpv_full.a"
          }

          # 设备版本 (arm64)
          create_fat_lib "scratch/arm64/" "lib_device" "Device"

          # 模拟器版本 (arm64-simulator)
          create_fat_lib "scratch/arm64-simulator/" "lib_simulator" "Simulator"

      - name: Create XCFramework
        run: |
          echo "=== Creating Libmpv.xcframework ==="
          
          # 创建头文件目录结构
          mkdir -p include_temp/Libmpv
          cp scratch/arm64/include/mpv/*.h include_temp/Libmpv/
          
          # 创建 module.modulemap
          echo 'module Libmpv {' > include_temp/Libmpv/module.modulemap
          for header in include_temp/Libmpv/*.h; do
              filename=$(basename "$header")
              echo "    header \"$filename\"" >> include_temp/Libmpv/module.modulemap
          done
          echo '    link "mpv"' >> include_temp/Libmpv/module.modulemap
          echo '    export *' >> include_temp/Libmpv/module.modulemap
          echo '}' >> include_temp/Libmpv/module.modulemap
          
          echo "=== Headers and module map ==="
          ls -la include_temp/
          
          # 创建 XCFramework
          mkdir -p lib
          xcodebuild -create-xcframework \
            -library lib_device/libmpv_full.a \
            -headers include_temp \
            -library lib_simulator/libmpv_full.a \
            -headers include_temp \
            -output lib/Libmpv.xcframework \
            -allow-internal-distribution
          
          echo "=== XCFramework created ==="
          ls -la lib/
          echo "=== Full XCFramework structure ==="
          find lib/Libmpv.xcframework -type f | sort
          
          # 验证 module.modulemap
          echo "=== Verify module.modulemap in XCFramework ==="
          find lib/Libmpv.xcframework -name "module.modulemap" -exec echo "Found: {}" \;
          if [ -z "$(find lib/Libmpv.xcframework -name 'module.modulemap')" ]; then
              echo "ERROR: module.modulemap not found in XCFramework!"
              exit 1
          fi

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework
          retention-days: 30

  # Job 4: 测试 XCFramework
  test-xcframework:
    name: Test XCFramework
    uses: ./.github/workflows/test-xcframework.yml
    needs: create-xcframework
    if: "!startsWith(github.ref, 'refs/tags/')"
    with:
      artifact_name: Libmpv-xcframework
    secrets: inherit
