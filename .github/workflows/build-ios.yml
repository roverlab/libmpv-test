name: Build libmpv for iOS

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment (development or distribution)'
        required: true
        default: 'distribution'
        type: choice
        options:
          - development
          - distribution
      mpv_version:
        description: 'mpv version'
        required: false
        default: '0.39.0'
      libplacebo_version:
        description: 'libplacebo version (required for mpv 0.39+)'
        required: false
        default: '6.338.0'
      ffmpeg_version:
        description: 'FFmpeg version (>= 6.1 required for mpv 0.39)'
        required: false
        default: '7.0'
      libass_version:
        description: 'libass version (>= 0.12.2 required)'
        required: false
        default: '0.17.3'
      freetype_version:
        description: 'freetype version'
        required: false
        default: '2.13.2'
      harfbuzz_version:
        description: 'harfbuzz version'
        required: false
        default: '8.4.0'
      fribidi_version:
        description: 'fribidi version'
        required: false
        default: '1.0.13'
      uchardet_version:
        description: 'uchardet version'
        required: false
        default: '0.0.5'

env:
  MPV_VERSION: ${{ github.event.inputs.mpv_version || '0.39.0' }}
  LIBPLACEBO_VERSION: ${{ github.event.inputs.libplacebo_version || '6.338.2' }}
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '7.0' }}
  LIBASS_VERSION: ${{ github.event.inputs.libass_version || '0.17.3' }}
  FREETYPE_VERSION: ${{ github.event.inputs.freetype_version || '2.13.2' }}
  HARFBUZZ_VERSION: ${{ github.event.inputs.harfbuzz_version || '8.4.0' }}
  FRIBIDI_VERSION: ${{ github.event.inputs.fribidi_version || '1.0.13' }}
  UCHARDET_VERSION: ${{ github.event.inputs.uchardet_version || '0.0.5' }}

jobs:
  # Job 1: 编译所有依赖库（字体库、uchardet、ffmpeg），缓存结果
  dependencies:
    name: Build dependencies
    runs-on: macos-latest

    steps:
      # === 先检查缓存，缓存命中则跳过所有安装和编译步骤 ===
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            scratch
          key: ios-deps-${{ runner.os }}-${{ env.FREETYPE_VERSION }}-${{ env.HARFBUZZ_VERSION }}-${{ env.FRIBIDI_VERSION }}-${{ env.LIBASS_VERSION }}-${{ env.UCHARDET_VERSION }}-${{ env.FFMPEG_VERSION }}
          restore-keys: |
            ios-deps-${{ runner.os }}-

      - name: Checkout repository
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Setup Xcode
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson

      - name: Install gas-preprocessor
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      # === 编译所有依赖（libplacebo 和 mpv 除外）===
      - name: Build dependencies (Step 1-3)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "=== Building all dependencies (font libs, uchardet, ffmpeg) ==="
          ./build.sh -e distribution -s 1
          ./build.sh -e distribution -s 2
          ./build.sh -e distribution -s 3

      # === 上传依赖作为 artifact，供 mpv job 使用 ===
      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dependencies
          path: scratch/
          retention-days: 30

  # Job 2: 编译 mpv（依赖 Job 1 的结果）
  build:
    name: Build libmpv for iOS
    runs-on: macos-latest
    needs: dependencies

    steps:
      # === 检查 mpv 编译缓存 ===
      # 缓存完整的 src 和 scratch 目录（设备和模拟器）
      - name: Cache libmpv build
        id: cache-mpv
        uses: actions/cache@v4
        with:
          path: |
            scratch/arm64
            scratch/arm64-simulator
            src
          key: ios-mpv-v3-${{ runner.os }}-${{ env.MPV_VERSION }}-${{ env.LIBPLACEBO_VERSION }}-${{ env.FFMPEG_VERSION }}
          restore-keys: |
            ios-mpv-v3-${{ runner.os }}-

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          # Python 3.14 breaks libplacebo's utils_gen.py (ElementTree API change)
          # Install Python 3.13 for meson/subproject code generation
          brew install python@3.13

      - name: Download sources
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      # === 下载依赖 artifact ===
      - name: Download dependencies
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ios-dependencies
          path: scratch/

      # === 编译 mpv（libplacebo 作为 subproject 自动编译）===
      - name: Build libmpv for device
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          echo "=== Building libmpv for device (arm64) ==="
          chmod +x build.sh
          chmod +x scripts/*-build
          ./build.sh -e distribution -s 4
          
          # 保存设备版本的 libmpv.a
          mkdir -p scratch/arm64-device
          if [ -f "scratch/arm64/lib/libmpv.a" ]; then
            cp scratch/arm64/lib/libmpv.a scratch/arm64-device/
          fi
          # 保存设备版本的头文件
          if [ -d "scratch/arm64/include/mpv" ]; then
            cp -r scratch/arm64/include/mpv scratch/arm64-device/
          fi

      # === 编译 mpv for simulator ===
      - name: Build libmpv for simulator
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          echo "=== Building libmpv for simulator (arm64) ==="
          
          # 依赖库已经在 scratch/arm64 中（来自 dependencies job）
          # 直接编译模拟器版本，build.sh 会使用 arm64-simulator 目录
          chmod +x build.sh
          chmod +x scripts/*-build
          ./build.sh -e simulator -s 4
          
          echo "=== Simulator build completed ==="
          ls -la scratch/arm64-simulator/lib/libmpv.a 2>/dev/null || echo "Simulator libmpv.a not found"

      # === 准备最终产物 ===
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -d "lib" ]; then
            cp -r lib/* artifacts/
          fi
          if [ -d "scratch/arm64/lib" ]; then
            mkdir -p artifacts/arm64
            cp -r scratch/arm64/lib/*.a artifacts/arm64/ 2>/dev/null || true
            # Also copy libmpv.a to artifacts root for compatibility
            cp scratch/arm64/lib/libmpv.a artifacts/ 2>/dev/null || true
          fi
          find scratch/arm64/lib -name "*.dylib" -exec cp {} artifacts/ \; 2>/dev/null || true
          echo "=== Artifacts contents ==="
          ls -laR artifacts/ 2>/dev/null || echo "No artifacts found"

      - name: Create distribution archive
        run: |
          cd artifacts
          if [ -n "$(ls -A . 2>/dev/null)" ]; then
            tar -czvf libmpv-ios-distribution.tar.gz *
          else
            echo "No files to archive, creating empty marker"
            touch libmpv-ios-distribution.tar.gz
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-ios-distribution
          path: artifacts/libmpv-ios-distribution.tar.gz
          retention-days: 30

      - name: Upload library files
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-libraries-distribution
          path: |
            lib/*.a
          retention-days: 30
          if-no-files-found: warn

      # === 验证头文件是否存在 ===
      - name: Verify mpv headers
        run: |
          echo "=== Verifying mpv headers ==="
          echo "Cache hit: ${{ steps.cache-mpv.outputs.cache-hit }}"
          
          # 检查 scratch/arm64 目录结构
          echo "=== scratch/arm64 directory structure ==="
          ls -la scratch/arm64/ 2>/dev/null || echo "scratch/arm64 not found"
          
          # 检查 src 目录
          echo "=== src directory ==="
          ls -la src/ 2>/dev/null || echo "src not found"
          
          if [ -d "scratch/arm64/include/mpv" ]; then
            echo "Headers found in scratch/arm64/include/mpv:"
            ls -la scratch/arm64/include/mpv/
          else
            echo "WARNING: scratch/arm64/include/mpv not found"
            echo "Attempting to copy headers from source..."
            MPV_SRC_DIR=$(ls -d src/mpv-* 2>/dev/null | head -1)
            if [ -n "$MPV_SRC_DIR" ]; then
              mkdir -p scratch/arm64/include/mpv
              cp "$MPV_SRC_DIR/libmpv/client.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/video/out/opengl_cb.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/video/out/gpu/hwdec.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/render.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/render_gl.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/stream_cb.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/sub/sub.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/player/scripting/qjs.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              echo "Headers copied:"
              ls -la scratch/arm64/include/mpv/
            else
              echo "ERROR: mpv source directory not found"
              # 如果是缓存命中但没有源码，说明缓存有问题，需要清除
              echo "Cache may be corrupted. This run will fail to force cache miss on next run."
              exit 1
            fi
          fi

      # === 上传完整 scratch 目录（含头文件和库，供测试 job 使用）===
      - name: Upload build artifacts for testing
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-build-artifacts
          path: |
            scratch/
            src/
          retention-days: 30
          if-no-files-found: warn

  build-development:
    name: Build libmpv for iOS (Development)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          # Python 3.14 breaks libplacebo's utils_gen.py (ElementTree API change)
          # Install Python 3.13 for meson/subproject code generation
          brew install python@3.13
          # Use brew-installed meson instead of pip

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      - name: Build libmpv (Development)
        run: |
          ./build.sh -e development

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -d "lib" ]; then
            cp -r lib/* artifacts/
          fi

      - name: Create distribution archive
        run: |
          cd artifacts
          tar -czvf libmpv-ios-development.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-ios-development
          path: artifacts/libmpv-ios-development.tar.gz
          retention-days: 30

  # Job 4: 验证编译产物
  verify-build:
    name: Verify Build Artifacts
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # === 下载 build job 的完整编译产物（含 scratch 和 src）===
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-build-artifacts
          path: ./
        continue-on-error: true

      # === 验证下载的产物 ===
      - name: Verify downloaded artifacts
        run: |
          echo "=== Checking downloaded artifacts ==="
          echo "scratch directory:"
          ls -la scratch/ 2>/dev/null || echo "scratch/ not found"
          echo "src directory:"
          ls -la src/ 2>/dev/null || echo "src/ not found"
          
          # 检查设备版
          echo "=== Device build (arm64) ==="
          if [ -d "scratch/arm64/lib" ]; then
            echo "libmpv.a (device):"
            ls -la scratch/arm64/lib/libmpv.a 2>/dev/null || echo "libmpv.a not found in scratch/arm64"
          fi
          
          # 检查模拟器版
          echo "=== Simulator build (arm64-simulator) ==="
          if [ -d "scratch/arm64-simulator/lib" ]; then
            echo "libmpv.a (simulator):"
            ls -la scratch/arm64-simulator/lib/libmpv.a 2>/dev/null || echo "libmpv.a not found in scratch/arm64-simulator"
          fi

      # === 创建 XCFramework 用于验证 ===
      - name: Create XCFramework for verification
        run: |
          echo "=== Creating Libmpv.xcframework ==="
          
          # 创建头文件目录
          mkdir -p include_temp
          if [ -d "scratch/arm64/include/mpv" ]; then
            cp scratch/arm64/include/mpv/*.h include_temp/
          else
            echo "ERROR: mpv headers not found"
            exit 1
          fi
          
          # 创建 XCFramework（包含设备和模拟器架构）
          mkdir -p lib
          
          if [ -f "scratch/arm64-simulator/lib/libmpv.a" ]; then
            # 如果有模拟器版本，创建包含两个架构的 xcframework
            xcodebuild -create-xcframework \
              -library scratch/arm64/lib/libmpv.a \
              -headers include_temp \
              -library scratch/arm64-simulator/lib/libmpv.a \
              -output lib/Libmpv.xcframework
          else
            # 只有设备版本
            xcodebuild -create-xcframework \
              -library scratch/arm64/lib/libmpv.a \
              -headers include_temp \
              -output lib/Libmpv.xcframework
          fi
          
          echo "=== XCFramework created ==="
          ls -la lib/
          ls -laR lib/Libmpv.xcframework/

      # === 验证 SPM 集成 ===
      - name: Verify SPM integration (iOS Device)
        run: |
          echo "=== Verifying SPM can resolve the package ==="
          swift package resolve 2>&1 || echo "SPM resolve completed"
          
          echo "=== Building package (iOS Device) ==="
          xcodebuild build \
            -scheme LibMpv-iOS \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath .build-device \
            2>&1 | tail -50
          
          echo "=== Device build completed ==="

      - name: Verify SPM integration (iOS Simulator)
        run: |
          echo "=== Building package (iOS Simulator) ==="
          xcodebuild build \
            -scheme LibMpv-iOS \
            -destination "generic/platform=iOS Simulator" \
            -configuration Release \
            -derivedDataPath .build-simulator \
            2>&1 | tail -50
          
          echo "=== Simulator build completed ==="

      - name: Upload xcframework
        uses: actions/upload-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework
          retention-days: 30

  release:
    name: Create Release
    needs: [build, verify-build]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download xcframework
        uses: actions/download-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-ios-distribution
          path: artifacts

      - name: Prepare release assets
        run: |
          # Create zip of xcframework for SPM
          cd lib
          zip -r Libmpv.xcframework.zip Libmpv.xcframework
          
          # Generate checksum for SPM
          CHECKSUM=$(swift package compute-checksum Libmpv.xcframework.zip)
          echo "XCFramework checksum: $CHECKSUM"
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV
          
          # Move to release directory
          mkdir -p release
          mv Libmpv.xcframework.zip release/
          mv ../artifacts/* release/ 2>/dev/null || true
          
          # Create checksum file
          echo "$CHECKSUM" > release/checksum.txt
          
          ls -la release/

      - name: Update Package.swift with checksum
        run: |
          # Update Package.swift with the new checksum
          sed -i '' "s/checksum: ".*"/checksum: \"$CHECKSUM\"/" Package.swift
          cat Package.swift

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*
          generate_release_notes: true
          body: |
            ## Libmpv for iOS
            
            Pre-built libmpv library for iOS.
            
            ### Installation
            
            Add to your `Package.swift`:
            ```swift
            dependencies: [
                .package(url: "https://github.com/roverlab/libmpv-test", from: "${{ github.ref_name }}")
            ]
            ```
            
            Or in Xcode: File > Add Packages > enter repository URL.
            
            ### Included Libraries
            - mpv ${{ env.MPV_VERSION }}
            - FFmpeg ${{ env.FFMPEG_VERSION }}
            - libass ${{ env.LIBASS_VERSION }}
            - freetype ${{ env.FREETYPE_VERSION }}
            - harfbuzz ${{ env.HARFBUZZ_VERSION }}
            - fribidi ${{ env.FRIBIDI_VERSION }}
            - uchardet ${{ env.UCHARDET_VERSION }}
            
            ### Checksum
            `$CHECKSUM`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated Package.swift
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Package.swift
          git diff --quiet && git diff --staged --quiet || git commit -m "Update checksum for ${{ github.ref_name }}"
          git push
