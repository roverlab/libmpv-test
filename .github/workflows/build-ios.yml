name: Build libmpv for iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # FFmpeg 缓存 key — 版本号变更时自动失效
  FFMPEG_CACHE_KEY: "ffmpeg-v7.0-ios-static"

jobs:
  # =========================================================================
  # Job 0: 编译 FFmpeg (device + simulator) 并缓存
  # 拆分为独立 job 的好处：
  #   1. 利用 matrix 同时编译两份，节省总 wall-clock 时间
  #   2. 编译产物通过 actions/cache 持久化，后续构建直接复用
  #   3. FFmpeg 版本不变时，后续 CI run 几乎零成本（缓存命中）
  # =========================================================================
  build-ffmpeg:
    name: Build FFmpeg (${{ matrix.environment }})
    runs-on: macos-latest
    strategy:
      matrix:
        environment: [distribution, simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 第一步：检查 FFmpeg 编译产物缓存（放在最前面，命中则跳过所有构建步骤）──
      - id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/
          key: ${{ env.FFMPEG_CACHE_KEY }}-${{ matrix.environment }}-${{ runner.os }}

      # ── 以下步骤仅在缓存未命中时执行 ──
      - name: Setup Xcode
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Install gas-preprocessor
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Make build scripts executable
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/*.sh scripts/components/*.sh

      - name: Download sources
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          ./scripts/download.sh

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "=== Building FFmpeg for ${{ matrix.environment }} (cache miss) ==="
          ./scripts/build.sh -e ${{ matrix.environment }} -s 1

      - name: Verify FFmpeg build
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== FFmpeg libraries for ${{ matrix.environment }} ==="
          ls -la scratch/$ARCH_DIR/lib/libav*.a scratch/$ARCH_DIR/lib/libsw*.a scratch/$ARCH_DIR/lib/libpostproc.a 2>/dev/null || true

      - name: Upload FFmpeg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.environment }}
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/
          retention-days: 1

  # Job 1: 编译 libmpv (device + simulator) — FFmpeg 从缓存恢复，matrix 并行
  build-libmpv:
    name: Build libmpv (${{ matrix.environment }})
    runs-on: macos-latest
    needs: build-ffmpeg
    strategy:
      matrix:
        environment: [distribution, simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 安装构建依赖 ──
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Make build scripts executable
        run: |
          chmod +x scripts/*.sh scripts/components/*.sh

      # ── 下载源码 ──
      - name: Download sources
        run: |
          ./scripts/download.sh

      # ── 从 FFmpeg job 的 artifact 获取已编译好的 FFmpeg ──
      - name: Download FFmpeg artifact
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-${{ matrix.environment }}
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/

      - name: Verify FFmpeg libraries
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== FFmpeg libraries (restored from cache/artifact) ==="
          ls -la scratch/$ARCH_DIR/lib/libav*.a scratch/$ARCH_DIR/lib/libsw*.a 2>/dev/null || echo "No FFmpeg libs found"

      - name: Build libmpv (+ subprojects)
        run: |
          echo "=== Building libmpv for ${{ matrix.environment }} (arm64) ==="
          echo "    Subprojects: libass, freetype2, harfbuzz, fribidi, uchardet, libplacebo, lcms2"
          echo "    FFmpeg: restored from cache (skipped rebuild)"
          ./scripts/build.sh -e ${{ matrix.environment }} -s 2

      - name: Verify build
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== ${{ matrix.environment }} build results ==="
          ls -la scratch/$ARCH_DIR/lib/
          ls -la scratch/$ARCH_DIR/lib/libmpv.a

      - name: Upload libmpv artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-${{ matrix.environment }}
          path: |
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/
            ${{ matrix.environment == 'distribution' && 'scratch/arm64/include/' || '' }}
          retention-days: 1

  # Job 3: 创建 XCFramework 并验证
  create-xcframework:
    name: Create XCFramework
    runs-on: macos-latest
    needs: build-libmpv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download device artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-distribution
          path: scratch/arm64/

      - name: Download simulator artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-simulator
          path: scratch/arm64-simulator/lib/

      - name: Verify artifacts
        run: |
          echo "=== Device libraries ==="
          ls -la scratch/arm64/lib/
          echo "=== Simulator libraries ==="
          ls -la scratch/arm64-simulator/lib/
          echo "=== Headers ==="
          ls -la scratch/arm64/include/mpv/

      - name: Create fat libraries
        run: |
          # Use 'libtool -static' instead of 'ar -x + ar -rcs' to merge archives.
          # The ar approach has a fatal flaw: when multiple .a files contain object
          # files with the same filename (e.g. utils.o, config.o appear in FFmpeg,
          # libass, and mpv), 'ar -x' silently overwrites the earlier file, causing
          # "Undefined symbol" linker errors. libtool handles this correctly.
          #
          # NOTE: Xcode 26+ removed -force_load support from libtool -static.
          # To ensure all symbols from certain libs (e.g. libplacebo's ra_* symbols
          # that are referenced indirectly via function pointers) are included,
          # we use a two-step approach:
          #   1. Merge "force-load" libs separately into a combined archive.
          #   2. Merge that combined archive with all other libs into the final output.
          # This works because libtool -static includes ALL object files when merging
          # static archives (unlike the linker which does dead-code stripping).

          # Helper function to create fat library for a given architecture
          create_fat_lib() {
              local arch_dir="$1"
              local output_dir="$2"
              local label="$3"

              echo "=== Creating ${label} fat library ==="
              mkdir -p "$output_dir"

              # Collect all .a files
              ALL_LIBS=$(ls "${arch_dir}"lib/*.a)
              echo "All libs to merge:$ALL_LIBS"

              # Merge ALL static libraries into the final fat library.
              # libtool -static includes ALL object files from every input archive,
              # so no symbol can ever be missed (unlike the linker which does dead-code
              # stripping). This is critical for indirect/referenced-via-function-pointer
              # symbols like libplacebo's ra_* and lcms2's _cms_* .
              libtool -static -o "${output_dir}/libmpv_full.a" $ALL_LIBS

              echo "${label} fat library size:"
              ls -lh "${output_dir}/libmpv_full.a"
          }

          # 设备版本 (arm64)
          create_fat_lib "scratch/arm64/" "lib_device" "Device"

          # 模拟器版本 (arm64-simulator)
          create_fat_lib "scratch/arm64-simulator/" "lib_simulator" "Simulator"

      - name: Create XCFramework
        run: |
          echo "=== Creating Libmpv.xcframework ==="
          
          # 创建头文件目录结构（XCFramework + SPM binaryTarget 兼容格式）
          # 关键：headers 必须放在以模块名命名的子目录中
          # 结构：
          #   headers_dir/
          #     Libmpv/           ← 模块名子目录（SPM 要求）
          #       module.modulemap
          #       *.h            ← 所有头文件
          mkdir -p include_temp/Libmpv
          cp scratch/arm64/include/mpv/*.h include_temp/Libmpv/
          
          # 创建 module.modulemap（Swift/SPM 识别 C 模块所必需）
          echo 'module Libmpv {' > include_temp/Libmpv/module.modulemap
          for header in include_temp/Libmpv/*.h; do
              filename=$(basename "$header")
              echo "    header \"$filename\"" >> include_temp/Libmpv/module.modulemap
          done
          echo '    link "mpv"' >> include_temp/Libmpv/module.modulemap
          echo '    export *' >> include_temp/Libmpv/module.modulemap
          echo '}' >> include_temp/Libmpv/module.modulemap
          
          echo "=== Headers and module map ==="
          ls -la include_temp/
          
          # 创建 XCFramework
          # -allow-internal-distribution: 允许不含签名信息的分发用 framework
          mkdir -p lib
          xcodebuild -create-xcframework \
            -library lib_device/libmpv_full.a \
            -headers include_temp \
            -library lib_simulator/libmpv_full.a \
            -headers include_temp \
            -output lib/Libmpv.xcframework \
            -allow-internal-distribution
          
          echo "=== XCFramework created ==="
          ls -la lib/
          echo "=== Full XCFramework structure ==="
          find lib/Libmpv.xcframework -type f | sort
          
          # 验证 module.modulemap 是否被正确打包进 XCFramework
          echo "=== Verify module.modulemap in XCFramework ==="
          find lib/Libmpv.xcframework -name "module.modulemap" -exec echo "Found: {}" \;
          if [ -z "$(find lib/Libmpv.xcframework -name 'module.modulemap')" ]; then
              echo "ERROR: module.modulemap not found in XCFramework!"
              exit 1
          fi

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework
          retention-days: 30

  # Job 4: 测试 XCFramework（调用独立工作流）
  test-xcframework:
    name: Test XCFramework
    uses: ./.github/workflows/test-xcframework.yml
    needs: create-xcframework
    if: "!startsWith(github.ref, 'refs/tags/')"
    with:
      artifact_name: Libmpv-xcframework
    secrets: inherit

  # Job 5: 创建 Release
  release:
    name: Create Release
    runs-on: macos-latest
    needs: [create-xcframework]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework

      - name: Prepare release assets
        run: |
          echo "=== Checking downloaded files ==="
          ls -la lib/
          ls -la lib/Libmpv.xcframework/
          
          # Create zip of xcframework for SPM
          cd lib
          zip -r Libmpv.xcframework.zip Libmpv.xcframework
          echo "=== Created Libmpv.xcframework.zip ==="
          ls -la Libmpv.xcframework.zip
          
          # Generate checksum for SPM
          CHECKSUM=$(swift package compute-checksum Libmpv.xcframework.zip)
          echo "XCFramework checksum: $CHECKSUM"
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV
          
          # Move to release directory
          cd ..
          mkdir -p release
          mv lib/Libmpv.xcframework.zip release/
          
          # Create checksum file
          echo "$CHECKSUM" > release/checksum.txt
          
          echo "=== Release files ==="
          ls -la release/

      - name: Update Package.swift with checksum
        run: |
          RELEASE_URL="https://github.com/roverlab/libmpv-test/releases/download/${{ github.ref_name }}/Libmpv.xcframework.zip"
          sed -i '' "s|url: \".*\"|url: \"$RELEASE_URL\"|" Package.swift
          sed -i '' "s|checksum: \".*\"|checksum: \"$CHECKSUM\"|" Package.swift
          cat Package.swift

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Libmpv.xcframework.zip
            release/checksum.txt
          generate_release_notes: true
          body: |
            ## Libmpv for iOS
            
            Pre-built libmpv library for iOS.
            
            ### Installation
            
            Add to your `Package.swift`:
            ```swift
            dependencies: [
                .package(url: "https://github.com/roverlab/libmpv-test", from: "${{ github.ref_name }}")
            ]
            ```
            
            Or in Xcode: File > Add Packages > enter repository URL.
            
            ### Included Libraries
            Versions are defined in [download.sh](blob/main/scripts/download.sh).
            
            ### Checksum
            `$CHECKSUM`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
