name: Build libmpv for iOS

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment (development or distribution)'
        required: true
        default: 'distribution'
        type: choice
        options:
          - development
          - distribution
      mpv_version:
        description: 'mpv version'
        required: false
        default: '0.39.0'
      ffmpeg_version:
        description: 'FFmpeg version (>= 6.1 required for mpv 0.39)'
        required: false
        default: '7.0'
      libass_version:
        description: 'libass version (>= 0.12.2 required)'
        required: false
        default: '0.17.3'
      freetype_version:
        description: 'freetype version'
        required: false
        default: '2.13.2'
      harfbuzz_version:
        description: 'harfbuzz version'
        required: false
        default: '8.4.0'
      fribidi_version:
        description: 'fribidi version'
        required: false
        default: '1.0.13'
      uchardet_version:
        description: 'uchardet version'
        required: false
        default: '0.0.5'

env:
  MPV_VERSION: ${{ github.event.inputs.mpv_version || '0.39.0' }}
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '7.0' }}
  LIBASS_VERSION: ${{ github.event.inputs.libass_version || '0.17.3' }}
  FREETYPE_VERSION: ${{ github.event.inputs.freetype_version || '2.13.2' }}
  HARFBUZZ_VERSION: ${{ github.event.inputs.harfbuzz_version || '8.4.0' }}
  FRIBIDI_VERSION: ${{ github.event.inputs.fribidi_version || '1.0.13' }}
  UCHARDET_VERSION: ${{ github.event.inputs.uchardet_version || '0.0.5' }}

jobs:
  build:
    name: Build libmpv for iOS (${{ matrix.environment }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - distribution
        include:
          - environment: distribution
            build_type: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          # Use brew-installed meson instead of pip

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      # === Step 1: 字体库（可缓存）===
      - name: Cache font libraries
        if: matrix.environment == 'distribution'
        id: cache-font-libs
        uses: actions/cache@v4
        with:
          path: |
            scratch/arm64/lib/libfreetype.a
            scratch/arm64/lib/libharfbuzz.a
            scratch/arm64/lib/libfribidi.a
            scratch/arm64/lib/libass.a
            scratch/arm64/include/freetype2
            scratch/arm64/include/harfbuzz
            scratch/arm64/include/fribidi
            scratch/arm64/include/ass
            scratch/arm64/lib/pkgconfig
          key: ios-font-libs-${{ runner.os }}-${{ env.FREETYPE_VERSION }}-${{ env.HARFBUZZ_VERSION }}-${{ env.FRIBIDI_VERSION }}-${{ env.LIBASS_VERSION }}
          restore-keys: |
            ios-font-libs-${{ runner.os }}-

      - name: Build font libraries
        if: matrix.environment == 'distribution' && steps.cache-font-libs.outputs.cache-hit != 'true'
        run: |
          echo "=== Step 1: Building font libraries (freetype, harfbuzz, fribidi, libass) ==="
          ./build.sh -e distribution -s 1

      # === Step 2: uchardet（可缓存）===
      - name: Cache uchardet
        if: matrix.environment == 'distribution'
        id: cache-uchardet
        uses: actions/cache@v4
        with:
          path: |
            scratch/arm64/lib/libuchardet.a
            scratch/arm64/include/uchardet
            scratch/arm64/lib/pkgconfig
          key: ios-uchardet-${{ runner.os }}-${{ env.UCHARDET_VERSION }}
          restore-keys: |
            ios-uchardet-${{ runner.os }}-

      - name: Build uchardet
        if: matrix.environment == 'distribution' && steps.cache-uchardet.outputs.cache-hit != 'true'
        run: |
          echo "=== Step 2: Building uchardet ==="
          ./build.sh -e distribution -s 2

      # === Step 3: FFmpeg（可独立缓存，耗时最长）===
      - name: Cache FFmpeg
        if: matrix.environment == 'distribution'
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            scratch/arm64/lib/libavcodec.a
            scratch/arm64/lib/libavformat.a
            scratch/arm64/lib/libavutil.a
            scratch/arm64/lib/libswresample.a
            scratch/arm64/lib/libswscale.a
            scratch/arm64/lib/libavfilter.a
            scratch/arm64/lib/libavdevice.a
            scratch/arm64/lib/libpostproc.a
            scratch/arm64/lib/pkgconfig
          key: ios-ffmpeg-${{ runner.os }}-${{ env.FFMPEG_VERSION }}
          restore-keys: |
            ios-ffmpeg-${{ runner.os }}-

      - name: Build FFmpeg
        if: matrix.environment == 'distribution' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "=== Step 3: Building FFmpeg (this takes a while...) ==="
          ./build.sh -e distribution -s 3

      # === Step 4: libmpv（最后编译，通常不需要缓存）===
      - name: Build libmpv
        if: matrix.environment == 'distribution'
        run: |
          echo "=== Step 4: Building libmpv ==="
          ./build.sh -e distribution -s 4

      - name: Build libmpv (Development)
        if: matrix.environment == 'development'
        run: |
          ./build.sh -e development

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -d "lib" ]; then
            cp -r lib/* artifacts/
          fi
          if [ -d "scratch/arm64/lib" ]; then
            mkdir -p artifacts/arm64
            cp -r scratch/arm64/lib/*.a artifacts/arm64/ 2>/dev/null || true
          fi
          # Copy shared libraries if exist
          if [ -d "scratch/arm64/lib" ]; then
            find scratch/arm64/lib -name "*.dylib" -exec cp {} artifacts/ \; 2>/dev/null || true
          fi

      - name: Create distribution archive
        run: |
          cd artifacts
          tar -czvf libmpv-ios-${{ matrix.environment }}.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-ios-${{ matrix.environment }}
          path: artifacts/libmpv-ios-${{ matrix.environment }}.tar.gz
          retention-days: 30

      - name: Upload library files
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-libraries-${{ matrix.environment }}
          path: |
            lib/*.a
          retention-days: 30
          if-no-files-found: warn

  build-development:
    name: Build libmpv for iOS (Development)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          # Use brew-installed meson instead of pip

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      - name: Build libmpv (Development)
        run: |
          ./build.sh -e development

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -d "lib" ]; then
            cp -r lib/* artifacts/
          fi

      - name: Create distribution archive
        run: |
          cd artifacts
          tar -czvf libmpv-ios-development.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-ios-development
          path: artifacts/libmpv-ios-development.tar.gz
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-ios-distribution
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
