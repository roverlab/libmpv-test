name: Build libmpv & Libffmpeg for iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # 缓存 key — 版本号变更时自动失效
  FFMPEG_CACHE_KEY: "ffmpeg-v8.1-ios-static"

jobs:
  # =========================================================================
  # Job 1: 编译 FFmpeg + dav1d (device + simulator) → Libffmpeg.xcframework
  # =========================================================================
  build-ffmpeg:
    name: Build FFmpeg (${{ matrix.environment }})
    runs-on: macos-latest
    strategy:
      matrix:
        environment: [distribution, simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 检查 FFmpeg 编译产物缓存
      - id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/
          key: ${{ env.FFMPEG_CACHE_KEY }}-${{ matrix.environment }}-${{ runner.os }}

      - name: Setup Xcode
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Make build scripts executable
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/*.sh scripts/components/*.sh

      - name: Build dav1d (AV1 decoder)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "=== Building dav1d for ${{ matrix.environment }} (cache miss) ==="
          ./scripts/build.sh -e ${{ matrix.environment }} -s 0

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "=== Building FFmpeg for ${{ matrix.environment }} (cache miss) ==="
          ./scripts/build.sh -e ${{ matrix.environment }} -s 1

      - name: Verify FFmpeg build
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== FFmpeg libraries for ${{ matrix.environment }} ==="
          ls -la scratch/$ARCH_DIR/lib/libav*.a scratch/$ARCH_DIR/lib/libsw*.a scratch/$ARCH_DIR/lib/libpostproc.a scratch/$ARCH_DIR/lib/libdav1d.a 2>/dev/null || true

      - name: Upload FFmpeg artifact (for Libffmpeg.xcframework)
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.environment }}
          path: |
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/include/
          retention-days: 1

  # =========================================================================
  # Job 2: 编译 libmpv (device + simulator)
  # =========================================================================
  build-libmpv:
    name: Build libmpv (${{ matrix.environment }})
    runs-on: macos-latest
    needs: [build-ffmpeg]
    strategy:
      matrix:
        environment: [distribution, simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Make build scripts executable
        run: |
          chmod +x scripts/*.sh scripts/components/*.sh

      # 下载 FFmpeg artifacts
      - name: Download FFmpeg artifact
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-${{ matrix.environment }}
          path: scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/

      - name: Verify dependencies
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== FFmpeg libraries ==="
          ls -la scratch/$ARCH_DIR/lib/libav*.a scratch/$ARCH_DIR/lib/libsw*.a 2>/dev/null || echo "No FFmpeg libs"

      - name: Build libmpv (+ subprojects)
        run: |
          echo "=== Building libmpv for ${{ matrix.environment }} (arm64) ==="
          echo "    Subprojects: libass, freetype2, harfbuzz, fribidi, libplacebo"
          ./scripts/build.sh -e ${{ matrix.environment }} -s 2

      - name: Verify build
        run: |
          ARCH_DIR="${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}"
          echo "=== ${{ matrix.environment }} build results ==="
          ls -la scratch/$ARCH_DIR/lib/
          ls -la scratch/$ARCH_DIR/lib/libmpv.a

      - name: Upload libmpv artifacts (for Libmpv.xcframework)
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-${{ matrix.environment }}
          path: |
            scratch/${{ matrix.environment == 'distribution' && 'arm64' || 'arm64-simulator' }}/lib/
            ${{ matrix.environment == 'distribution' && 'scratch/arm64/include/' || '' }}
          retention-days: 1

  # =========================================================================
  # Job 3: 创建 Libffmpeg.xcframework (FFmpeg + dav1d)
  # =========================================================================
  create-ffmpeg-xcframework:
    name: Create Libffmpeg XCFramework
    runs-on: macos-latest
    needs: build-ffmpeg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download device FFmpeg artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-distribution
          path: scratch/arm64/

      - name: Download simulator FFmpeg artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-simulator
          path: scratch/arm64-simulator/

      - name: Verify FFmpeg artifacts
        run: |
          echo "=== Device FFmpeg libraries ==="
          ls -la scratch/arm64/lib/ 2>/dev/null || echo "No device libs"
          echo "=== Simulator FFmpeg libraries ==="
          ls -la scratch/arm64-simulator/lib/ 2>/dev/null || echo "No simulator libs"
          echo "=== FFmpeg headers ==="
          ls -la scratch/arm64/include/ 2>/dev/null || echo "No headers"
          find scratch/arm64/include -name "*.h" -type f 2>/dev/null | head -20 || true

      - name: Create Libffmpeg fat library (device)
        run: |
          echo "=== Creating Libffmpeg device fat library ==="
          mkdir -p lib_ffmpeg_device
          
          # 收集所有 FFmpeg + dav1d 静态库
          ALL_LIBS=$(ls scratch/arm64/lib/*.a 2>/dev/null)
          echo "FFmpeg device libs: $ALL_LIBS"
          
          if [ -z "$ALL_LIBS" ]; then
              echo "ERROR: No FFmpeg libraries found for device!"
              exit 1
          fi
          
          libtool -static -o lib_ffmpeg_device/libffmpeg_full.a $ALL_LIBS
          echo "Device fat library size:"
          ls -lh lib_ffmpeg_device/libffmpeg_full.a

      - name: Create Libffmpeg fat library (simulator)
        run: |
          echo "=== Creating Libffmpeg simulator fat library ==="
          mkdir -p lib_ffmpeg_simulator
          
          # 收集所有 FFmpeg + dav1d 静态库
          ALL_LIBS=$(ls scratch/arm64-simulator/lib/*.a 2>/dev/null)
          echo "FFmpeg simulator libs: $ALL_LIBS"
          
          if [ -z "$ALL_LIBS" ]; then
              echo "ERROR: No FFmpeg libraries found for simulator!"
              exit 1
          fi
          
          libtool -static -o lib_ffmpeg_simulator/libffmpeg_full.a $ALL_LIBS
          echo "Simulator fat library size:"
          ls -lh lib_ffmpeg_simulator/libffmpeg_full.a

      - name: Create Libffmpeg headers and modulemap
        run: |
          echo "=== Preparing Libffmpeg headers ==="
          mkdir -p include_temp/Libffmpeg
          
          # 复制 FFmpeg 头文件 (libav*, libsw*, libpostproc)
          if [ -d "scratch/arm64/include" ]; then
              # 复制主要 FFmpeg 目录
              for dir in libavcodec libavformat libavutil libswresample libswscale libpostproc; do
                  if [ -d "scratch/arm64/include/$dir" ]; then
                      cp -r "scratch/arm64/include/$dir" include_temp/Libffmpeg/
                      echo "Copied: $dir"
                  fi
              done
              # 复制顶层 FFmpeg 头文件
              cp scratch/arm64/include/*.h include_temp/Libffmpeg/ 2>/dev/null || true
              # 复制 libavcodec 内部子目录（如 libavcodec/avcodec.h 等）
              find scratch/arm64/include -name "*.h" -type f | while read h; do
                  relpath="${h#scratch/arm64/include/}"
                  destdir="include_temp/Libffmpeg/$(dirname "$relpath")"
                  mkdir -p "$destdir"
                  cp "$h" "$destdir/"
              done
          fi
          
          echo "=== Header structure ==="
          find include_temp/Libffmpeg -name "*.h" -type f | head -30
          
          # 1️⃣ 创建 umbrella header (Libffmpeg.h)
          # 将所有 FFmpeg 公共头文件集中到一个入口文件中，
          # Clang 通过此文件建立完整的模块依赖图，解决跨目录 #include 问题
          cat > include_temp/Libffmpeg/Libffmpeg.h << 'EOF'
          #ifndef Libffmpeg_h
          #define Libffmpeg_h

          #include "libavutil/avutil.h"
          #include "libavcodec/avcodec.h"
          #include "libavformat/avformat.h"
          #include "libswresample/swresample.h"
          #include "libswscale/swscale.h"

          #endif
          EOF

          # 2️⃣ 创建 module.modulemap (使用 umbrella header + textual header)
          # umbrella header "Libffmpeg.h" — 主入口，建立跨目录头文件依赖关系
          # textual header "libavutil/avconfig.h" — 关键修复！
          #   avconfig.h 是 FFmpeg ./configure 生成的文件，被 macros.h 以相对路径引用。
          #   Swift 编译器调用的 Clang dependency scanner 在展开 umbrella header 时，
          #   无法正确搜索到这种深层嵌套的 #include。textual header 告诉 Clang 将其
          #   作为普通文本头文件处理（不做模块化检查），从而绕过此限制。
          cat > include_temp/Libffmpeg/module.modulemap << 'EOF'
          module Libffmpeg [system] {
              umbrella header "Libffmpeg.h"
              textual header "libavutil/avconfig.h"
              export *
          }
          EOF
          
          cat include_temp/Libffmpeg/module.modulemap

      - name: Create Libffmpeg.xcframework
        run: |
          echo "=== Creating Libffmpeg.xcframework ==="
          mkdir -p lib
          
          xcodebuild -create-xcframework \
            -library lib_ffmpeg_device/libffmpeg_full.a \
            -headers include_temp \
            -library lib_ffmpeg_simulator/libffmpeg_full.a \
            -headers include_temp \
            -output lib/Libffmpeg.xcframework \
            -allow-internal-distribution
          
          echo "=== Libffmpeg.xcframework created ==="
          ls -la lib/
          echo "=== Full XCFramework structure ==="
          find lib/Libffmpeg.xcframework -type f | sort

      - name: Upload Libffmpeg XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Libffmpeg-xcframework
          path: lib/Libffmpeg.xcframework
          retention-days: 1

  # =========================================================================
  # Job 4: 创建 Libmpv.xcframework (仅 mpv + subprojects, 不含 ffmpeg/dav1d)
  # =========================================================================
  create-mpv-xcframework:
    name: Create Libmpv XCFramework
    runs-on: macos-latest
    needs: build-libmpv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download device artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-distribution
          path: scratch/arm64/

      - name: Download simulator artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-simulator
          path: scratch/arm64-simulator/lib/

      - name: Verify artifacts
        run: |
          echo "=== Device libraries ==="
          ls -la scratch/arm64/lib/
          echo "=== Simulator libraries ==="
          ls -la scratch/arm64-simulator/lib/
          echo "=== Headers ==="
          ls -la scratch/arm64/include/mpv/ 2>/dev/null || echo "No mpv headers"

      - name: Create fat libraries (exclude FFmpeg/dav1d libs)
        run: |
          # Helper function to create fat library for a given architecture
          # 排除 FFmpeg 和 dav1d 的静态库 (libav*, libsw*, libpostproc, libdav1d)
          create_mpv_fat_lib() {
              local arch_dir="$1"
              local output_dir="$2"
              local label="$3"
          
              echo "=== Creating ${label} fat library (mpv only) ==="
              mkdir -p "$output_dir"
          
              echo "=== All libraries in ${arch_dir}lib/ ==="
              ls -la "${arch_dir}lib/"*.a 2>/dev/null || echo "No .a files in lib/"
          
              # 收集非 FFmpeg/dav1d 的静态库
              MPV_LIBS=$(ls "${arch_dir}lib/"*.a 2>/dev/null | grep -v -E '(libav|libsw|libpostproc|libdav1d)' || true)
          
              echo "MPV-only libs to merge: $MPV_LIBS"
              
              if [ -z "$MPV_LIBS" ]; then
                  echo "ERROR: No mpv libraries found!"
                  exit 1
              fi
          
              libtool -static -o "${output_dir}/libmpv_full.a" $MPV_LIBS
          
              echo "${label} fat library size:"
              ls -lh "${output_dir}/libmpv_full.a"
          }
          
          # 设备版本 (arm64)
          create_mpv_fat_lib "scratch/arm64/" "lib_device" "Device"
          
          # 模拟器版本 (arm64-simulator)
          create_mpv_fat_lib "scratch/arm64-simulator/" "lib_simulator" "Simulator"

      - name: Create Libmpv XCFramework
        run: |
          echo "=== Creating Libmpv.xcframework ==="
          
          # 创建头文件目录结构
          mkdir -p include_temp/Libmpv
          cp scratch/arm64/include/mpv/*.h include_temp/Libmpv/
          
          # 创建 module.modulemap
          echo 'module Libmpv {' > include_temp/Libmpv/module.modulemap
          for header in include_temp/Libmpv/*.h; do
              filename=$(basename "$header")
              echo "    header \"$filename\"" >> include_temp/Libmpv/module.modulemap
          done
          echo '    link "mpv"' >> include_temp/Libmpv/module.modulemap
          echo '    export *' >> include_temp/Libmpv/module.modulemap
          echo '}' >> include_temp/Libmpv/module.modulemap
          
          echo "=== Headers and module map ==="
          ls -la include_temp/
          
          # 创建 XCFramework
          mkdir -p lib
          xcodebuild -create-xcframework \
            -library lib_device/libmpv_full.a \
            -headers include_temp \
            -library lib_simulator/libmpv_full.a \
            -headers include_temp \
            -output lib/Libmpv.xcframework \
            -allow-internal-distribution
          
          echo "=== XCFramework created ==="
          ls -la lib/
          echo "=== Full XCFramework structure ==="
          find lib/Libmpv.xcframework -type f | sort
          
          # 验证 module.modulemap
          echo "=== Verify module.modulemap in XCFramework ==="
          find lib/Libmpv.xcframework -name "module.modulemap" -exec echo "Found: {}" \;
          if [ -z "$(find lib/Libmpv.xcframework -name 'module.modulemap')" ]; then
              echo "ERROR: module.modulemap not found in XCFramework!"
              exit 1
          fi

      - name: Upload Libmpv XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework
          retention-days: 1


