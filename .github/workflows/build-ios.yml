name: Build libmpv for iOS

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment (development or distribution)'
        required: true
        default: 'distribution'
        type: choice
        options:
          - development
          - distribution
      mpv_version:
        description: 'mpv version'
        required: false
        default: '0.39.0'
      libplacebo_version:
        description: 'libplacebo version (required for mpv 0.39+)'
        required: false
        default: '6.338.0'
      ffmpeg_version:
        description: 'FFmpeg version (>= 6.1 required for mpv 0.39)'
        required: false
        default: '7.0'
      libass_version:
        description: 'libass version (>= 0.12.2 required)'
        required: false
        default: '0.17.3'
      freetype_version:
        description: 'freetype version'
        required: false
        default: '2.13.2'
      harfbuzz_version:
        description: 'harfbuzz version'
        required: false
        default: '8.4.0'
      fribidi_version:
        description: 'fribidi version'
        required: false
        default: '1.0.13'
      uchardet_version:
        description: 'uchardet version'
        required: false
        default: '0.0.5'

env:
  MPV_VERSION: ${{ github.event.inputs.mpv_version || '0.39.0' }}
  LIBPLACEBO_VERSION: ${{ github.event.inputs.libplacebo_version || '6.338.2' }}
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '7.0' }}
  LIBASS_VERSION: ${{ github.event.inputs.libass_version || '0.17.3' }}
  FREETYPE_VERSION: ${{ github.event.inputs.freetype_version || '2.13.2' }}
  HARFBUZZ_VERSION: ${{ github.event.inputs.harfbuzz_version || '8.4.0' }}
  FRIBIDI_VERSION: ${{ github.event.inputs.fribidi_version || '1.0.13' }}
  UCHARDET_VERSION: ${{ github.event.inputs.uchardet_version || '0.0.5' }}

jobs:
  # Job 1: 编译所有依赖库（字体库、uchardet、ffmpeg），缓存结果
  dependencies:
    name: Build dependencies
    runs-on: macos-latest

    steps:
      # === 先检查缓存，缓存命中则跳过所有安装和编译步骤 ===
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            scratch
          key: ios-deps-${{ runner.os }}-${{ env.FREETYPE_VERSION }}-${{ env.HARFBUZZ_VERSION }}-${{ env.FRIBIDI_VERSION }}-${{ env.LIBASS_VERSION }}-${{ env.UCHARDET_VERSION }}-${{ env.FFMPEG_VERSION }}
          restore-keys: |
            ios-deps-${{ runner.os }}-

      - name: Checkout repository
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Setup Xcode
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson

      - name: Install gas-preprocessor
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      # === 编译所有依赖（libplacebo 和 mpv 除外）===
      - name: Build dependencies (Step 1-3)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "=== Building all dependencies (font libs, uchardet, ffmpeg) ==="
          ./build.sh -e distribution -s 1
          ./build.sh -e distribution -s 2
          ./build.sh -e distribution -s 3

      # === 上传依赖作为 artifact，供 mpv job 使用 ===
      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dependencies
          path: scratch/
          retention-days: 30

  # Job 2: 编译 mpv（依赖 Job 1 的结果）
  build:
    name: Build libmpv for iOS
    runs-on: macos-latest
    needs: dependencies

    steps:
      # === 检查 mpv 编译缓存 ===
      - name: Cache libmpv build
        id: cache-mpv
        uses: actions/cache@v4
        with:
          path: |
            scratch/arm64
            src/mpv-*
            src/libplacebo
          key: ios-mpv-${{ runner.os }}-${{ env.MPV_VERSION }}-${{ env.LIBPLACEBO_VERSION }}-${{ env.FFMPEG_VERSION }}
          restore-keys: |
            ios-mpv-${{ runner.os }}-

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          # Python 3.14 breaks libplacebo's utils_gen.py (ElementTree API change)
          # Install Python 3.13 for meson/subproject code generation
          brew install python@3.13

      - name: Download sources
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      # === 下载依赖 artifact ===
      - name: Download dependencies
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ios-dependencies
          path: scratch/

      # === 编译 mpv（libplacebo 作为 subproject 自动编译）===
      - name: Build libmpv
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          echo "=== Building libmpv (with libplacebo subproject) ==="
          chmod +x build.sh
          chmod +x scripts/*-build
          ./build.sh -e distribution -s 4

      # === 准备最终产物 ===
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -d "lib" ]; then
            cp -r lib/* artifacts/
          fi
          if [ -d "scratch/arm64/lib" ]; then
            mkdir -p artifacts/arm64
            cp -r scratch/arm64/lib/*.a artifacts/arm64/ 2>/dev/null || true
            # Also copy libmpv.a to artifacts root for compatibility
            cp scratch/arm64/lib/libmpv.a artifacts/ 2>/dev/null || true
          fi
          find scratch/arm64/lib -name "*.dylib" -exec cp {} artifacts/ \; 2>/dev/null || true
          echo "=== Artifacts contents ==="
          ls -laR artifacts/ 2>/dev/null || echo "No artifacts found"

      - name: Create distribution archive
        run: |
          cd artifacts
          if [ -n "$(ls -A . 2>/dev/null)" ]; then
            tar -czvf libmpv-ios-distribution.tar.gz *
          else
            echo "No files to archive, creating empty marker"
            touch libmpv-ios-distribution.tar.gz
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-ios-distribution
          path: artifacts/libmpv-ios-distribution.tar.gz
          retention-days: 30

      - name: Upload library files
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-libraries-distribution
          path: |
            lib/*.a
          retention-days: 30
          if-no-files-found: warn

      # === 验证头文件是否存在 ===
      - name: Verify mpv headers
        run: |
          echo "=== Verifying mpv headers ==="
          if [ -d "scratch/arm64/include/mpv" ]; then
            echo "Headers found in scratch/arm64/include/mpv:"
            ls -la scratch/arm64/include/mpv/
          else
            echo "WARNING: scratch/arm64/include/mpv not found"
            echo "Attempting to copy headers from source..."
            MPV_SRC_DIR=$(ls -d src/mpv-* 2>/dev/null | head -1)
            if [ -n "$MPV_SRC_DIR" ]; then
              mkdir -p scratch/arm64/include/mpv
              cp "$MPV_SRC_DIR/libmpv/client.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/video/out/opengl_cb.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/video/out/gpu/hwdec.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/render.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/render_gl.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/stream_cb.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/sub/sub.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/player/scripting/qjs.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              echo "Headers copied:"
              ls -la scratch/arm64/include/mpv/
            else
              echo "ERROR: mpv source directory not found"
              exit 1
            fi
          fi

      # === 上传完整 scratch 目录（含头文件和库，供测试 job 使用）===
      - name: Upload build artifacts for testing
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-build-artifacts
          path: |
            scratch/
            src/
          retention-days: 30
          if-no-files-found: warn

  build-development:
    name: Build libmpv for iOS (Development)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          # Python 3.14 breaks libplacebo's utils_gen.py (ElementTree API change)
          # Install Python 3.13 for meson/subproject code generation
          brew install python@3.13
          # Use brew-installed meson instead of pip

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      - name: Build libmpv (Development)
        run: |
          ./build.sh -e development

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -d "lib" ]; then
            cp -r lib/* artifacts/
          fi

      - name: Create distribution archive
        run: |
          cd artifacts
          tar -czvf libmpv-ios-development.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-ios-development
          path: artifacts/libmpv-ios-development.tar.gz
          retention-days: 30

  # Job 4: 截图功能测试（复用 build job 的编译产物，运行 XCTest）
  test-screenshot:
    name: Test Screenshot (iOS Simulator)
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Make scripts executable
        run: |
          chmod +x scripts/create-framework.sh

      # === 下载 build job 的完整编译产物（含 scratch 和 src）===
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-build-artifacts
          path: ./
        continue-on-error: true

      # === 验证下载的产物 ===
      - name: Verify downloaded artifacts
        run: |
          echo "=== Checking downloaded artifacts ==="
          echo "scratch directory:"
          ls -la scratch/ 2>/dev/null || echo "scratch/ not found"
          echo "src directory:"
          ls -la src/ 2>/dev/null || echo "src/ not found"
          if [ -d "scratch/arm64/lib" ]; then
            echo "libmpv.a:"
            ls -la scratch/arm64/lib/libmpv.a 2>/dev/null || echo "libmpv.a not found in scratch"
          fi
          
          # 如果头文件缺失，从源码目录复制
          if [ ! -d "scratch/arm64/include/mpv" ]; then
            echo "=== mpv headers not found, copying from source ==="
            MPV_SRC_DIR=$(ls -d src/mpv-* 2>/dev/null | head -1)
            if [ -n "$MPV_SRC_DIR" ]; then
              mkdir -p scratch/arm64/include/mpv
              cp "$MPV_SRC_DIR/libmpv/client.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/video/out/opengl_cb.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/video/out/gpu/hwdec.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/render.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/render_gl.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/stream_cb.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/sub/sub.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              cp "$MPV_SRC_DIR/player/scripting/qjs.h" scratch/arm64/include/mpv/ 2>/dev/null || true
              echo "Headers copied to scratch/arm64/include/mpv/"
              ls -la scratch/arm64/include/mpv/
            else
              echo "ERROR: Cannot find mpv source directory to copy headers"
            fi
          fi

      # === 创建 Libmpv.framework（使用已编译好的产物）===
      - name: Create Libmpv.framework
        run: |
          echo "=== Creating Libmpv.framework from build artifacts ==="
          ./scripts/create-framework.sh

      # === 下载测试视频 ===
      - name: Download test video
        run: |
          echo "=== Downloading test video ==="
          ROOT="$(pwd)"
          TEST_VIDEO_DIR="$ROOT/Tests/Resources"
          mkdir -p "$TEST_VIDEO_DIR"
          
          VIDEO_URL="https://samplelib.com/preview/mp4/sample-5s.mp4"
          VIDEO_PATH="$TEST_VIDEO_DIR/input.mp4"
          
          echo "Downloading from $VIDEO_URL..."
          curl -f -L -o "$VIDEO_PATH" "$VIDEO_URL"
          
          FILE_SIZE=$(stat -f%z "$VIDEO_PATH")
          echo "Test video downloaded: $VIDEO_PATH ($FILE_SIZE bytes)"
          file "$VIDEO_PATH"

      # === 运行 iOS 模拟器测试 ===
      - name: Run tests on iOS Simulator
        run: |
          SIMULATOR_NAME="iPhone 16"
          
          # 创建头文件目录结构（xcframework 需要）
          # xcodebuild -create-xcframework 需要头文件直接在 include 目录下，不在子目录中
          mkdir -p include_temp
          if [ -d "scratch/arm64/include/mpv" ]; then
            cp scratch/arm64/include/mpv/*.h include_temp/
          else
            echo "ERROR: scratch/arm64/include/mpv directory not found"
            exit 1
          fi
          
          # 创建 Libmpv.xcframework
          mkdir -p lib
          xcodebuild -create-xcframework \
            -library scratch/arm64/lib/libmpv.a \
            -headers include_temp \
            -output lib/Libmpv.xcframework
          
          # 列出可用的 schemes
          echo "=== Available schemes ==="
          xcodebuild -list || true
          
          # 启动模拟器并运行测试
          xcrun simctl boot "$SIMULATOR_NAME" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_NAME" -b
          
          # 使用 xcodebuild 运行测试
          # SPM 项目 scheme 名称通常是 Package name
          xcodebuild test \
            -scheme LibMpv-iOS \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -configuration Debug \
            -derivedDataPath .build \
            -enableCodeCoverage YES \
            2>&1 | tee test-output.log

      # === 收集测试产物（截图文件）===
      - name: Collect screenshot artifacts
        if: always()
        run: |
          echo "=== Collecting screenshots and logs ==="
          mkdir -p test-results
          
          # 复制测试日志
          cp test-output.log test-results/ 2>/dev/null || true
          
          # 查找并复制截图文件（保存在模拟器的 Documents 目录）
          SIMULATOR_HOME=$(xcrun simctl get_app_container "iPhone 16" booted data)
          if [ -n "$SIMULATOR_HOME" ]; then
            find "$SIMULATOR_HOME/Documents" -name "screenshot_*.png" -exec cp {} test-results/ \; 2>/dev/null || true
          fi
          
          # 也尝试从用户域的 Documents 获取
          find ~/Library/Developer/CoreSimulator/Devices -name "screenshot_*.png" 2>/dev/null | while read f; do
            cp "$f" test-results/
          done
          
          ls -la test-results/ 2>/dev/null || echo "No test results found"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mpv-screenshot-test-results
          path: test-results/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mpv-screenshots
          path: |
            test-results/screenshot_*.png
          retention-days: 30
          if-no-files-found: ignore

      # === 关闭模拟器 ===
      - name: Shutdown simulator
        if: always()
        run: |
          xcrun simctl shutdown "iPhone 16" 2>/dev/null || true

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-ios-distribution
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
