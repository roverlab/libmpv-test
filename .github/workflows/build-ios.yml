name: Build libmpv for iOS

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mpv_version:
        description: 'mpv version'
        required: false
        default: '0.39.0'
      libplacebo_version:
        description: 'libplacebo version (required for mpv 0.39+)'
        required: false
        default: '6.338.0'
      ffmpeg_version:
        description: 'FFmpeg version (>= 6.1 required for mpv 0.39)'
        required: false
        default: '7.0'
      libass_version:
        description: 'libass version (>= 0.12.2 required)'
        required: false
        default: '0.17.3'
      freetype_version:
        description: 'freetype version'
        required: false
        default: '2.13.2'
      harfbuzz_version:
        description: 'harfbuzz version'
        required: false
        default: '8.4.0'
      fribidi_version:
        description: 'fribidi version'
        required: false
        default: '1.0.13'
      uchardet_version:
        description: 'uchardet version'
        required: false
        default: '0.0.5'

permissions:
  contents: write

env:
  MPV_VERSION: ${{ github.event.inputs.mpv_version || '0.39.0' }}
  LIBPLACEBO_VERSION: ${{ github.event.inputs.libplacebo_version || '6.338.2' }}
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '7.0' }}
  LIBASS_VERSION: ${{ github.event.inputs.libass_version || '0.17.3' }}
  FREETYPE_VERSION: ${{ github.event.inputs.freetype_version || '2.13.2' }}
  HARFBUZZ_VERSION: ${{ github.event.inputs.harfbuzz_version || '8.4.0' }}
  FRIBIDI_VERSION: ${{ github.event.inputs.fribidi_version || '1.0.13' }}
  UCHARDET_VERSION: ${{ github.event.inputs.uchardet_version || '0.0.5' }}

jobs:
  # Job 1: 编译设备版 (arm64 iOS Device)
  build-device:
    name: Build for Device (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Cache device build (scratch + src)
        id: cache-device
        uses: actions/cache@v4
        with:
          path: |
            scratch/
            src/
          key: device-${{ env.MPV_VERSION }}-${{ env.FFMPEG_VERSION }}-${{ env.LIBASS_VERSION }}-${{ env.FREETYPE_VERSION }}-${{ env.HARFBUZZ_VERSION }}-${{ env.FRIBIDI_VERSION }}-${{ env.UCHARDET_VERSION }}-${{ env.LIBPLACEBO_VERSION }}
          restore-keys: |
            device-

      - name: Download sources
        if: steps.cache-device.outputs.cache-hit != 'true'
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          # Strip Windows CRLF (\r) — files edited on Windows get \r\n endings
          # that break the shebang on macOS: /bin/sh^M: bad interpreter
          find . -maxdepth 2 \( -name '*.sh' -o -name '*-build' \) \
            -exec sed -i '' 's/\r//' {} +
          chmod +x build.sh clean.sh download.sh
          chmod +x scripts/*-build

      - name: Build dependencies
        if: steps.cache-device.outputs.cache-hit != 'true'
        run: |
          echo "=== Building dependencies for device (arm64) ==="
          ./build.sh -e distribution -s 1
          ./build.sh -e distribution -s 2
          ./build.sh -e distribution -s 3

      - name: Build libmpv
        if: steps.cache-device.outputs.cache-hit != 'true'
        run: |
          echo "=== Building libmpv for device (arm64) ==="
          ./build.sh -e distribution -s 4

      - name: Verify build
        run: |
          echo "=== Device build results ==="
          ls -la scratch/arm64/lib/
          ls -la scratch/arm64/lib/libmpv.a

      - name: Upload device artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-device
          path: |
            scratch/arm64/lib/
            scratch/arm64/include/
          retention-days: 1

  # Job 2: 编译模拟器版 (arm64 iOS Simulator)
  build-simulator:
    name: Build for Simulator (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Cache simulator build (scratch + src)
        id: cache-simulator
        uses: actions/cache@v4
        with:
          path: |
            scratch/
            src/
          key: sim-${{ env.MPV_VERSION }}-${{ env.FFMPEG_VERSION }}-${{ env.LIBASS_VERSION }}-${{ env.FREETYPE_VERSION }}-${{ env.HARFBUZZ_VERSION }}-${{ env.FRIBIDI_VERSION }}-${{ env.UCHARDET_VERSION }}-${{ env.LIBPLACEBO_VERSION }}
          restore-keys: |
            sim-

      - name: Download sources
        if: steps.cache-simulator.outputs.cache-hit != 'true'
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          # Strip Windows CRLF (\r) — files edited on Windows get \r\n endings
          # that break the shebang on macOS: /bin/sh^M: bad interpreter
          find . -maxdepth 2 \( -name '*.sh' -o -name '*-build' \) \
            -exec sed -i '' 's/\r//' {} +
          chmod +x build.sh clean.sh download.sh
          chmod +x scripts/*-build

      - name: Build dependencies
        if: steps.cache-simulator.outputs.cache-hit != 'true'
        run: |
          echo "=== Building dependencies for simulator (arm64) ==="
          ./build.sh -e simulator -s 1
          ./build.sh -e simulator -s 2
          ./build.sh -e simulator -s 3

      - name: Build libmpv
        if: steps.cache-simulator.outputs.cache-hit != 'true'
        run: |
          echo "=== Building libmpv for simulator (arm64) ==="
          ./build.sh -e simulator -s 4

      - name: Verify build
        run: |
          echo "=== Simulator build results ==="
          ls -la scratch/arm64-simulator/lib/
          ls -la scratch/arm64-simulator/lib/libmpv.a

      - name: Upload simulator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-simulator
          path: scratch/arm64-simulator/lib/
          retention-days: 1

  # Job 3: 创建 XCFramework 并验证
  create-xcframework:
    name: Create XCFramework
    runs-on: macos-latest
    needs: [build-device, build-simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download device artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-device
          path: scratch/arm64/

      - name: Download simulator artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-simulator
          path: scratch/arm64-simulator/lib/

      - name: Verify artifacts
        run: |
          echo "=== Device libraries ==="
          ls -la scratch/arm64/lib/
          echo "=== Simulator libraries ==="
          ls -la scratch/arm64-simulator/lib/
          echo "=== Headers ==="
          ls -la scratch/arm64/include/mpv/

      - name: Create fat libraries
        run: |
          # Use 'libtool -static' instead of 'ar -x + ar -rcs' to merge archives.
          # The ar approach has a fatal flaw: when multiple .a files contain object
          # files with the same filename (e.g. utils.o, config.o appear in FFmpeg,
          # libass, and mpv), 'ar -x' silently overwrites the earlier file, causing
          # "Undefined symbol" linker errors. libtool handles this correctly.

          # 设备版本 - 合并所有静态库
          echo "=== Creating device fat library ==="
          mkdir -p lib_device
          DEVICE_LIBS=$(ls scratch/arm64/lib/*.a)
          echo "Merging: $DEVICE_LIBS"
          libtool -static -o lib_device/libmpv_full.a $DEVICE_LIBS
          echo "Device fat library size:"
          ls -lh lib_device/libmpv_full.a

          # 模拟器版本 - 合并所有静态库
          echo "=== Creating simulator fat library ==="
          mkdir -p lib_simulator
          SIM_LIBS=$(ls scratch/arm64-simulator/lib/*.a)
          echo "Merging: $SIM_LIBS"
          libtool -static -o lib_simulator/libmpv_full.a $SIM_LIBS
          echo "Simulator fat library size:"
          ls -lh lib_simulator/libmpv_full.a

      - name: Create XCFramework
        run: |
          echo "=== Creating Libmpv.xcframework ==="
          
          # 创建头文件目录结构（XCFramework + SPM binaryTarget 兼容格式）
          # 关键：headers 必须放在以模块名命名的子目录中
          # 结构：
          #   headers_dir/
          #     Libmpv/           ← 模块名子目录（SPM 要求）
          #       module.modulemap
          #       *.h            ← 所有头文件
          mkdir -p include_temp/Libmpv
          cp scratch/arm64/include/mpv/*.h include_temp/Libmpv/
          
          # 创建 module.modulemap（Swift/SPM 识别 C 模块所必需）
          echo 'module Libmpv {' > include_temp/Libmpv/module.modulemap
          for header in include_temp/Libmpv/*.h; do
              filename=$(basename "$header")
              echo "    header \"$filename\"" >> include_temp/Libmpv/module.modulemap
          done
          echo '    link "mpv"' >> include_temp/Libmpv/module.modulemap
          echo '    export *' >> include_temp/Libmpv/module.modulemap
          echo '}' >> include_temp/Libmpv/module.modulemap
          
          echo "=== Headers and module map ==="
          ls -la include_temp/
          
          # 创建 XCFramework
          # -allow-internal-distribution: 允许不含签名信息的分发用 framework
          mkdir -p lib
          xcodebuild -create-xcframework \
            -library lib_device/libmpv_full.a \
            -headers include_temp \
            -library lib_simulator/libmpv_full.a \
            -headers include_temp \
            -output lib/Libmpv.xcframework \
            -allow-internal-distribution
          
          echo "=== XCFramework created ==="
          ls -la lib/
          echo "=== Full XCFramework structure ==="
          find lib/Libmpv.xcframework -type f | sort
          
          # 验证 module.modulemap 是否被正确打包进 XCFramework
          echo "=== Verify module.modulemap in XCFramework ==="
          find lib/Libmpv.xcframework -name "module.modulemap" -exec echo "Found: {}" \;
          if [ -z "$(find lib/Libmpv.xcframework -name 'module.modulemap')" ]; then
              echo "ERROR: module.modulemap not found in XCFramework!"
              exit 1
          fi

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework
          retention-days: 30

  # Job 4: 测试 XCFramework（验证 SPM import Libmpv 可用）
  test-xcframework:
    name: Test XCFramework (SPM Import)
    runs-on: macos-latest
    needs: create-xcframework

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download XCFramework artifact
        uses: actions/download-artifact@v4
        with:
          name: Libmpv-xcframework
          path: Tests/VerifyLibmpv/Libmpv.xcframework

      - name: Verify XCFramework structure
        run: |
          echo "=== XCFramework directory ==="
          ls -la Tests/VerifyLibmpv/
          echo "=== Full XCFramework file tree ==="
          find Tests/VerifyLibmpv/Libmpv.xcframework -type f | sort
          echo ""
          echo "=== Check module.modulemap exists ==="
          find Tests/VerifyLibmpv/Libmpv.xcframework -name "module.modulemap" -exec echo "✅ Found: {}" \;
          if [ -z "$(find Tests/VerifyLibmpv/Libmpv.xcframework -name 'module.modulemap')" ]; then
              echo "❌ ERROR: module.modulemap not found in XCFramework!"
              exit 1
          fi
          echo ""
          echo "=== Check headers exist in XCFramework ==="
          find Tests/VerifyLibmpv/Libmpv.xcframework -name "*.h" -exec echo "✅ Header: {}" \;
          find Tests/VerifyLibmpv/Libmpv.xcframework -name "client.h" -exec echo "✅ client.h found" \;
          if [ -z "$(find Tests/VerifyLibmpv/Libmpv.xcframework -name 'client.h')" ]; then
              echo "❌ ERROR: client.h not found in XCFramework!"
              exit 1
          fi

      - name: Create test iOS framework project
        run: |
          # 创建一个最小的 iOS SPM 项目来验证 import Libmpv
          # 关键：XCFramework 放在包根目录下（与 Package.swift 同级）
          # 这样 binaryTarget 可以使用包内相对路径，避免 SPM 跨包解析问题
          # 目录结构：
          #   Tests/VerifyLibmpv/           ← SPM 包根目录
          #     Package.swift
          #     Libmpv.xcframework/        ← binaryTarget 在包内！
          #     Sources/VerifyLibmpv/
          #       VerifyLibmpv.swift
          #     Tests/VerifyLibmpvTests/
          #       VerifyLibmpvTests.swift
          mkdir -p Tests/VerifyLibmpv/Sources/VerifyLibmpv
          mkdir -p Tests/VerifyLibmpv/Tests/VerifyLibmpvTests

          # Package.swift — binaryTarget 使用包内相对路径
          # linkerSettings: static XCFrameworks don't auto-link their system
          # framework dependencies; we must declare them explicitly here.
          # Required by libmpv's dependencies:
          #   AVFoundation  ← AVCapture*, AVMedia*, AVAudioSession
          #   AudioToolbox  ← AudioUnit*, AudioComponent*, AudioFormat*
          #   CoreMedia     ← CMAudio*, CMBlock*, CMSample*, CMVideo*
          #   bz2           ← BZ2_* (system libbz2)
          #   z             ← _deflate*, _inflate*, _compress* (zlib; used by FFmpeg/libass)
          #   iconv         ← _iconv* (used by libass subtitle charset conversion)
          sed 's/^          //' > Tests/VerifyLibmpv/Package.swift << 'PKGEOF'
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "VerifyLibmpv",
              platforms: [.iOS(.v13)],
              targets: [
                  .target(
                      name: "VerifyLibmpv",
                      dependencies: ["Libmpv"],
                      path: "Sources/VerifyLibmpv",
                      linkerSettings: [
                          .linkedFramework("AVFoundation"),
                          .linkedFramework("AudioToolbox"),
                          .linkedFramework("CoreMedia"),
                          .linkedLibrary("bz2"),
                          .linkedLibrary("z"),
                          .linkedLibrary("iconv"),
                      ]
                  ),
                  .binaryTarget(
                      name: "Libmpv",
                      path: "Libmpv.xcframework"
                  ),
                  .testTarget(
                      name: "VerifyLibmpvTests",
                      dependencies: ["VerifyLibmpv"],
                      path: "Tests/VerifyLibmpvTests"
                  )
              ]
          )
          PKGEOF

          # Swift 源文件 — import Libmpv 并调用 mpv API
          # NOTE: use 'sed' to strip the 10-space YAML indentation from each line
          # so the generated Swift file has clean, unindented source code.
          #
          # Type notes:
          #   mpv_client_api_version() → C 'unsigned long' → Swift 'UInt' (NOT Int32)
          #   mpv_initialize / mpv_set_option_string → C 'int' → Swift 'Int32'
          sed 's/^          //' > Tests/VerifyLibmpv/Sources/VerifyLibmpv/VerifyLibmpv.swift << 'SWIFTEOF'
          import Libmpv

          // mpv_client_api_version() returns C 'unsigned long' → Swift UInt
          public func verifyMPVVersion() -> UInt {
              mpv_client_api_version()
          }

          public func verifyMPVCreate() -> Bool {
              mpv_create() != nil
          }

          @available(iOS 13, *)
          public func verifyMPVLifecycle() -> Bool {
              guard let handle = mpv_create() else { return false }
              guard mpv_set_option_string(handle, "vo", "null") >= 0 else {
                  mpv_terminate_destroy(handle); return false
              }
              guard mpv_initialize(handle) >= 0 else {
                  mpv_terminate_destroy(handle); return false
              }
              mpv_terminate_destroy(handle)
              return true
          }
          SWIFTEOF

          # 测试文件
          sed 's/^          //' > Tests/VerifyLibmpv/Tests/VerifyLibmpvTests/VerifyLibmpvTests.swift << 'TESTEOF'
          import XCTest
          @testable import VerifyLibmpv

          final class LibmpvImportTests: XCTestCase {

              func testImportLibmpvResolves() {
                  print("✅ import Libmpv resolved successfully via SPM binaryTarget")
              }

              func testMPVClientAPIVersion() {
                  // verifyMPVVersion() returns UInt, so compare with UInt literal
                  let v = verifyMPVVersion()
                  XCTAssertGreaterThan(v, 0 as UInt, "mpv_client_api_version() should > 0")
              }

              func testMPVCreateHandle() {
                  XCTAssertTrue(verifyMPVCreate(), "mpv_create() should return non-null handle")
              }

              func testMPVLifecycle() {
                  if #available(iOS 13, *) {
                      XCTAssertTrue(verifyMPVLifecycle(), "full mpv lifecycle should succeed")
                  }
              }
          }
          TESTEOF

          echo "✅ Test project created"
          find Tests/VerifyLibmpv -type f | sort

      - name: Boot iOS Simulator
        run: |
          # xcodebuild test requires a booted simulator — a registered-but-not-booted
          # device shows only as a placeholder and xcodebuild cannot match it.
          #
          # Strategy:
          #   1. Try to find an existing iPhone 16 Pro and boot it.
          #   2. Fall back to creating a new one from whatever iOS runtime is available.
          #   3. Wait for the simulator to reach 'Booted' state.
          #   4. Export SIM_UDID so later steps can reference it by id= (unambiguous).

          set -e

          # Find an existing iPhone 16 Pro, or pick the newest available iPhone type
          SIM_UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          hits = []
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                      hits.append((runtime, d['udid'], d['name']))
          # prefer iPhone 16 Pro, then any iPhone, sorted by runtime descending
          hits.sort(key=lambda x: (x[2]=='iPhone 16 Pro', x[0]), reverse=True)
          if hits:
              print(hits[0][1])
          " 2>/dev/null || true)

          if [ -z "$SIM_UDID" ]; then
            echo "No existing iPhone simulator found — creating one..."
            RUNTIME=$(xcrun simctl list runtimes available | grep 'iOS' | tail -1 | grep -Eo 'com\.apple\.CoreSimulator\.SimRuntime\.[^ ]+')
            DEVTYPE=$(xcrun simctl list devicetypes | grep 'iPhone' | tail -1 | grep -Eo 'com\.apple\.CoreSimulator\.SimDeviceType\.[^ ]+')
            SIM_UDID=$(xcrun simctl create "CI_iPhone" "$DEVTYPE" "$RUNTIME")
            echo "Created simulator: $SIM_UDID"
          fi

          echo "Booting simulator: $SIM_UDID"
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true   # already booted is fine

          # Wait until the simulator reaches Booted state (timeout 120 s)
          echo "Waiting for simulator to be ready..."
          for i in $(seq 1 24); do
            STATE=$(xcrun simctl list devices | grep "$SIM_UDID" | grep -Eo '\([A-Za-z ]+\)' | tr -d '()')
            echo "  [$i] state=$STATE"
            if [ "$STATE" = "Booted" ]; then break; fi
            sleep 5
          done

          echo "SIM_UDID=$SIM_UDID" >> $GITHUB_ENV
          echo "✅ Simulator ready: $SIM_UDID"

      - name: Build test project with xcodebuild (iOS Simulator)
        run: |
          cd Tests/VerifyLibmpv

          # 先解析包依赖（便于调试）
          swift package resolve 2>&1 || true
          
          echo "=== XCFramework path check (must be inside package root) ==="
          ls -la Libmpv.xcframework || echo "❌ XCFramework not found at expected path!"
          find Libmpv.xcframework -type f 2>/dev/null | head -30 || echo "❌ No files in XCFramework!"
          
          echo "=== Resolving package dependencies ==="
          xcodebuild -resolvePackageDependencies \
            -scheme VerifyLibmpv-Package \
            -platform iOS 2>&1 || true

          # Build-only step: generic/platform=iOS Simulator does NOT require a booted
          # simulator (it compiles for the platform without launching a device).
          xcodebuild build \
            -scheme VerifyLibmpv-Package \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -skip-testing:VerifyLibmpvTests \
            ONLY_ACTIVE_ARCH=YES

          echo "✅ xcodebuild succeeded — 'import Libmpv' resolves correctly in iOS Simulator build"

      - name: Run tests on iOS Simulator
        run: |
          cd Tests/VerifyLibmpv

          # Use id= with the booted simulator UDID — unambiguous, no device-matching
          # guesswork. SIM_UDID was exported by the "Boot iOS Simulator" step.
          # -only-testing format: TargetName/ClassName
          xcodebuild test \
            -scheme VerifyLibmpv-Package \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -only-testing:VerifyLibmpvTests/LibmpvImportTests

          echo "✅ All Libmpv import tests passed on iOS Simulator"

  # Job 5: 创建 Release
  release:
    name: Create Release
    runs-on: macos-latest
    needs: [create-xcframework, test-xcframework]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework

      - name: Prepare release assets
        run: |
          echo "=== Checking downloaded files ==="
          ls -la lib/
          ls -la lib/Libmpv.xcframework/
          
          # Create zip of xcframework for SPM
          cd lib
          zip -r Libmpv.xcframework.zip Libmpv.xcframework
          echo "=== Created Libmpv.xcframework.zip ==="
          ls -la Libmpv.xcframework.zip
          
          # Generate checksum for SPM
          CHECKSUM=$(swift package compute-checksum Libmpv.xcframework.zip)
          echo "XCFramework checksum: $CHECKSUM"
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV
          
          # Move to release directory
          cd ..
          mkdir -p release
          mv lib/Libmpv.xcframework.zip release/
          
          # Create checksum file
          echo "$CHECKSUM" > release/checksum.txt
          
          echo "=== Release files ==="
          ls -la release/

      - name: Update Package.swift with checksum
        run: |
          RELEASE_URL="https://github.com/roverlab/libmpv-test/releases/download/${{ github.ref_name }}/Libmpv.xcframework.zip"
          sed -i '' "s|url: \".*\"|url: \"$RELEASE_URL\"|" Package.swift
          sed -i '' "s|checksum: \".*\"|checksum: \"$CHECKSUM\"|" Package.swift
          cat Package.swift

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Libmpv.xcframework.zip
            release/checksum.txt
          generate_release_notes: true
          body: |
            ## Libmpv for iOS
            
            Pre-built libmpv library for iOS.
            
            ### Installation
            
            Add to your `Package.swift`:
            ```swift
            dependencies: [
                .package(url: "https://github.com/roverlab/libmpv-test", from: "${{ github.ref_name }}")
            ]
            ```
            
            Or in Xcode: File > Add Packages > enter repository URL.
            
            ### Included Libraries
            - mpv ${{ env.MPV_VERSION }}
            - FFmpeg ${{ env.FFMPEG_VERSION }}
            - libass ${{ env.LIBASS_VERSION }}
            - freetype ${{ env.FREETYPE_VERSION }}
            - harfbuzz ${{ env.HARFBUZZ_VERSION }}
            - fribidi ${{ env.FRIBIDI_VERSION }}
            - uchardet ${{ env.UCHARDET_VERSION }}
            
            ### Checksum
