name: Build libmpv for iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mpv_version:
        description: 'mpv version'
        required: false
        default: '0.39.0'
      libplacebo_version:
        description: 'libplacebo version (required for mpv 0.39+)'
        required: false
        default: '6.338.0'
      ffmpeg_version:
        description: 'FFmpeg version (>= 6.1 required for mpv 0.39)'
        required: false
        default: '7.0'
      libass_version:
        description: 'libass version (>= 0.12.2 required)'
        required: false
        default: '0.17.3'
      freetype_version:
        description: 'freetype version'
        required: false
        default: '2.13.2'
      harfbuzz_version:
        description: 'harfbuzz version'
        required: false
        default: '8.4.0'
      fribidi_version:
        description: 'fribidi version'
        required: false
        default: '1.0.13'
      uchardet_version:
        description: 'uchardet version'
        required: false
        default: '0.0.5'

permissions:
  contents: write

env:
  MPV_VERSION: ${{ github.event.inputs.mpv_version || '0.39.0' }}
  LIBPLACEBO_VERSION: ${{ github.event.inputs.libplacebo_version || '6.338.2' }}
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '7.0' }}
  LIBASS_VERSION: ${{ github.event.inputs.libass_version || '0.17.3' }}
  FREETYPE_VERSION: ${{ github.event.inputs.freetype_version || '2.13.2' }}
  HARFBUZZ_VERSION: ${{ github.event.inputs.harfbuzz_version || '8.4.0' }}
  FRIBIDI_VERSION: ${{ github.event.inputs.fribidi_version || '1.0.13' }}
  UCHARDET_VERSION: ${{ github.event.inputs.uchardet_version || '0.0.5' }}

jobs:
  # Job 1: 编译设备版 (arm64 iOS Device)
  build-device:
    name: Build for Device (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      - name: Build dependencies
        run: |
          echo "=== Building dependencies for device (arm64) ==="
          ./build.sh -e distribution -s 1
          ./build.sh -e distribution -s 2
          ./build.sh -e distribution -s 3

      - name: Build libmpv
        run: |
          echo "=== Building libmpv for device (arm64) ==="
          ./build.sh -e distribution -s 4

      - name: Verify build
        run: |
          echo "=== Device build results ==="
          ls -la scratch/arm64/lib/
          ls -la scratch/arm64/lib/libmpv.a

      - name: Upload device artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-device
          path: |
            scratch/arm64/lib/
            scratch/arm64/include/
          retention-days: 1

  # Job 2: 编译模拟器版 (arm64 iOS Simulator)
  build-simulator:
    name: Build for Simulator (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install pkg-config
          brew install nasm
          brew install meson
          brew install python@3.13

      - name: Install gas-preprocessor
        run: |
          sudo curl -L https://github.com/libav/gas-preprocessor/raw/master/gas-preprocessor.pl -o /usr/local/bin/gas-preprocessor.pl
          sudo chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Download sources
        run: |
          chmod +x download.sh
          ./download.sh

      - name: Make build scripts executable
        run: |
          chmod +x build.sh
          chmod +x clean.sh
          chmod +x scripts/*-build

      - name: Build dependencies
        run: |
          echo "=== Building dependencies for simulator (arm64) ==="
          ./build.sh -e simulator -s 1
          ./build.sh -e simulator -s 2
          ./build.sh -e simulator -s 3

      - name: Build libmpv
        run: |
          echo "=== Building libmpv for simulator (arm64) ==="
          ./build.sh -e simulator -s 4

      - name: Verify build
        run: |
          echo "=== Simulator build results ==="
          ls -la scratch/arm64-simulator/lib/
          ls -la scratch/arm64-simulator/lib/libmpv.a

      - name: Upload simulator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-simulator
          path: scratch/arm64-simulator/lib/
          retention-days: 1

  # Job 3: 创建 XCFramework 并验证
  create-xcframework:
    name: Create XCFramework
    runs-on: macos-latest
    needs: [build-device, build-simulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download device artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-device
          path: scratch/arm64/

      - name: Download simulator artifacts
        uses: actions/download-artifact@v4
        with:
          name: libmpv-simulator
          path: scratch/arm64-simulator/lib/

      - name: Verify artifacts
        run: |
          echo "=== Device libraries ==="
          ls -la scratch/arm64/lib/
          echo "=== Simulator libraries ==="
          ls -la scratch/arm64-simulator/lib/
          echo "=== Headers ==="
          ls -la scratch/arm64/include/mpv/

      - name: Create fat libraries
        run: |
          # 设备版本 - 合并所有静态库
          echo "=== Creating device fat library ==="
          mkdir -p lib_device
          cd lib_device
          for lib in ../scratch/arm64/lib/*.a; do
            echo "Extracting $lib..."
            ar -x "$lib"
          done
          ar -rcs libmpv_full.a *.o
          rm -f *.o
          cd ..
          echo "Device fat library size:"
          ls -lh lib_device/libmpv_full.a
          
          # 模拟器版本 - 合并所有静态库
          echo "=== Creating simulator fat library ==="
          mkdir -p lib_simulator
          cd lib_simulator
          for lib in ../scratch/arm64-simulator/lib/*.a; do
            echo "Extracting $lib..."
            ar -x "$lib"
          done
          ar -rcs libmpv_full.a *.o
          rm -f *.o
          cd ..
          echo "Simulator fat library size:"
          ls -lh lib_simulator/libmpv_full.a

      - name: Create XCFramework
        run: |
          echo "=== Creating Libmpv.xcframework ==="
          
          # 创建头文件目录
          mkdir -p include_temp
          cp scratch/arm64/include/mpv/*.h include_temp/
          
          # 创建 XCFramework
          mkdir -p lib
          xcodebuild -create-xcframework \
            -library lib_device/libmpv_full.a \
            -headers include_temp \
            -library lib_simulator/libmpv_full.a \
            -output lib/Libmpv.xcframework
          
          echo "=== XCFramework created ==="
          ls -la lib/
          ls -laR lib/Libmpv.xcframework/

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework
          retention-days: 30

  # Job 4: 创建 Release
  release:
    name: Create Release
    runs-on: macos-latest
    needs: create-xcframework
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework

      - name: Prepare release assets
        run: |
          echo "=== Checking downloaded files ==="
          ls -la lib/
          ls -la lib/Libmpv.xcframework/
          
          # Create zip of xcframework for SPM
          cd lib
          zip -r Libmpv.xcframework.zip Libmpv.xcframework
          echo "=== Created Libmpv.xcframework.zip ==="
          ls -la Libmpv.xcframework.zip
          
          # Generate checksum for SPM
          CHECKSUM=$(swift package compute-checksum Libmpv.xcframework.zip)
          echo "XCFramework checksum: $CHECKSUM"
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV
          
          # Move to release directory
          cd ..
          mkdir -p release
          mv lib/Libmpv.xcframework.zip release/
          
          # Create checksum file
          echo "$CHECKSUM" > release/checksum.txt
          
          echo "=== Release files ==="
          ls -la release/

      - name: Update Package.swift with checksum
        run: |
          RELEASE_URL="https://github.com/roverlab/libmpv-test/releases/download/${{ github.ref_name }}/Libmpv.xcframework.zip"
          sed -i '' "s|url: \".*\"|url: \"$RELEASE_URL\"|" Package.swift
          sed -i '' "s|checksum: \".*\"|checksum: \"$CHECKSUM\"|" Package.swift
          cat Package.swift

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Libmpv.xcframework.zip
            release/checksum.txt
          generate_release_notes: true
          body: |
            ## Libmpv for iOS
            
            Pre-built libmpv library for iOS.
            
            ### Installation
            
            Add to your `Package.swift`:
            ```swift
            dependencies: [
                .package(url: "https://github.com/roverlab/libmpv-test", from: "${{ github.ref_name }}")
            ]
            ```
            
            Or in Xcode: File > Add Packages > enter repository URL.
            
            ### Included Libraries
            - mpv ${{ env.MPV_VERSION }}
            - FFmpeg ${{ env.FFMPEG_VERSION }}
            - libass ${{ env.LIBASS_VERSION }}
            - freetype ${{ env.FREETYPE_VERSION }}
            - harfbuzz ${{ env.HARFBUZZ_VERSION }}
            - fribidi ${{ env.FRIBIDI_VERSION }}
            - uchardet ${{ env.UCHARDET_VERSION }}
            
            ### Checksum
            `$CHECKSUM`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
