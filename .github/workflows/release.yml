name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3). Leave empty to auto-increment from latest release.'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  # =========================================================================
  # Job 0: 确定版本号（自动 +1 或使用手动指定）
  # =========================================================================
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # 手动指定版本号
            VER="${{ inputs.version }}"
            echo "Using manual version: $VER"
          else
            # 自动获取最新 release 并 +1
            echo "Fetching latest release..."
            LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)

            if [ -z "$LATEST" ]; then
              # 没有 release，从 v0.0.0 开始，+1 = v0.0.1
              VER="0.0.1"
              echo "No existing release found, starting at v$VER"
            else
              # 去掉 v 前缀，解析语义化版本
              RAW="${LATEST#v}"
              MAJOR=$(echo "$RAW" | cut -d. -f1)
              MINOR=$(echo "$RAW" | cut -d. -f2)
              PATCH=$(echo "$RAW" | cut -d. -f3)

              # PATCH +1
              PATCH=$((PATCH + 1))
              VER="$MAJOR.$MINOR.$PATCH"
              echo "Auto-incremented: $LATEST -> v$VER"
            fi
          fi

          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # Job 1: 从最近一次 build-ios 工作流下载 XCFramework artifacts
  # =========================================================================
  download-artifacts:
    name: Download Artifacts from Latest Build
    runs-on: ubuntu-latest
    needs: resolve-version

    steps:
      - name: Find latest build-ios workflow run
        id: find-run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // 查找最近一次成功的 build-ios 工作流
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'build-ios.yml',
              status: 'success',
              per_page: 1
            });

            if (runs.total_count === 0) {
              throw new Error('No successful build-ios workflow runs found');
            }

            const runId = runs.workflow_runs[0].id;
            console.log(`Found latest build-ios run: ${runId}`);
            core.setOutput('run_id', runId.toString());

      - name: Download Libmpv XCFramework artifact
        uses: actions/download-artifact@v4
        with:
          name: Libmpv-xcframework
          path: lib/Libmpv.xcframework
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find-run.outputs.run_id }}
          ignore-not-found: false

      - name: Download Libffmpeg XCFramework artifact
        uses: actions/download-artifact@v4
        with:
          name: Libffmpeg-xcframework
          path: lib/Libffmpeg.xcframework
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find-run.outputs.run_id }}
          ignore-not-found: false

      - name: Verify artifacts
        run: |
          echo "=== Libmpv XCFramework ==="
          find lib/Libmpv.xcframework -type f | sort
          echo ""
          echo "=== Libffmpeg XCFramework ==="
          find lib/Libffmpeg.xcframework -type f | sort

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: release-xcframeworks
          path: lib/
          retention-days: 1

  # =========================================================================
  # Job 2: 创建 GitHub Release (同时发布两个 XCFramework)
  # =========================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [resolve-version, download-artifacts]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download XCFrameworks
        uses: actions/download-artifact@v4
        with:
          name: release-xcframeworks
          path: lib/

      - name: Prepare release assets
        run: |
          echo "=== Preparing release assets ==="
          ls -la lib/
          ls -la lib/Libmpv.xcframework/
          ls -la lib/Libffmpeg.xcframework/

          mkdir -p release
          cd lib

          # Create zip of Libmpv.xcframework for SPM
          zip -r ../release/Libmpv.xcframework.zip Libmpv.xcframework
          echo "=== Created Libmpv.xcframework.zip ==="

          # Create zip of Libffmpeg.xcframework for SPM
          zip -r ../release/Libffmpeg.xcframework.zip Libffmpeg.xcframework
          echo "=== Created Libffmpeg.xcframework.zip ==="

          cd ..

          # Generate checksums for SPM
          LIBMPV_CHECKSUM=$(sha256sum release/Libmpv.xcframework.zip | awk '{print $1}')
          LIBFFMPEG_CHECKSUM=$(sha256sum release/Libffmpeg.xcframework.zip | awk '{print $1}')
          echo "Libmpv checksum:   $LIBMPV_CHECKSUM"
          echo "Libffmpeg checksum: $LIBFFMPEG_CHECKSUM"

          echo "LIBMPV_CHECKSUM=$LIBMPV_CHECKSUM" >> $GITHUB_ENV
          echo "LIBFFMPEG_CHECKSUM=$LIBFFMPEG_CHECKSUM" >> $GITHUB_ENV

          # Create checksum file
          cat > release/checksum.txt << EOF
          Libmpv.xcframework.zip:   $LIBMPV_CHECKSUM
          Libffmpeg.xcframework.zip: $LIBFFMPEG_CHECKSUM
          EOF

          echo "=== Release files ==="
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: "Libmpv & Libffmpeg ${{ needs.resolve-version.outputs.version }}"
          files: |
            release/Libmpv.xcframework.zip
            release/Libffmpeg.xcframework.zip
            release/checksum.txt
          generate_release_notes: true
          body: |
            ## ${{ needs.resolve-version.outputs.version }}

            ### Assets
            | File | Checksum |
            |------|----------|
            | `Libmpv.xcframework.zip` | `${{ env.LIBMPV_CHECKSUM }}` |
            | `Libffmpeg.xcframework.zip` | `${{ env.LIBFFMPEG_CHECKSUM }}` |

            ### SPM Usage
            ```swift
            // 方式 1: 使用 Libmpv (自动包含 Libffmpeg)
            .package(url: "https://github.com/roverlab/libmpv-ios", from: "${{ needs.resolve-version.outputs.version }}")

            // 方式 2: 仅使用 Libffmpeg
            .product(name: "Libffmpeg", package: "libmpv-ios")
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift with checksums
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          LIBMPV_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Libmpv.xcframework.zip"
          LIBFFMPEG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Libffmpeg.xcframework.zip"

          if [ -f "Package.swift" ]; then
            # 更新 LibmpvBinary 的 url 和 checksum
            sed -i "s|url: \"[^\"]*Libmpv[^\"]*\"|url: \"$LIBMPV_URL\"|" Package.swift
            sed -i "/name: \"LibmpvBinary\"/,/)/{
              s|checksum: \"[^\"]*\"|checksum: \"$LIBMPV_CHECKSUM\"|
            }" Package.swift

            # 更新 LibffmpegBinary 的 url 和 checksum
            sed -i "s|url: \"[^\"]*Libffmpeg[^\"]*\"|url: \"$LIBFFMPEG_URL\"|" Package.swift
            sed -i "/name: \"LibffmpegBinary\"/,/)/{
              s|checksum: \"[^\"]*\"|checksum: \"$LIBFFMPEG_CHECKSUM\"|
            }" Package.swift

            echo "=== Updated Package.swift ==="
            cat Package.swift
          else
            echo "WARNING: Package.swift not found, skipping update"
          fi

      - name: Commit and push Package.swift to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git diff --cached --quiet || {
            git commit -m "chore: update Package.swift for ${{ needs.resolve-version.outputs.tag }}"
            git push origin main
            echo "✅ Pushed Package.swift update to main"
          }
