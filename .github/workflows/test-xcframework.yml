name: Test XCFramework

on:
  workflow_call:
    inputs:
      artifact_name:
        description: 'XCFramework artifact name to download'
        required: false
        default: 'Libmpv-xcframework'
        type: string

jobs:
  test-xcframework:
    name: Test XCFramework (SPM Import)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download XCFramework artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: Tests/VerifyLibmpv/Libmpv.xcframework

      - name: Verify XCFramework structure
        run: |
          echo "=== XCFramework directory ==="
          ls -la Tests/VerifyLibmpv/
          echo "=== Full XCFramework file tree ==="
          find Tests/VerifyLibmpv/Libmpv.xcframework -type f | sort
          echo ""
          echo "=== Check module.modulemap exists ==="
          find Tests/VerifyLibmpv/Libmpv.xcframework -name "module.modulemap" -exec echo "✅ Found: {}" \;
          if [ -z "$(find Tests/VerifyLibmpv/Libmpv.xcframework -name 'module.modulemap')" ]; then
              echo "❌ ERROR: module.modulemap not found in XCFramework!"
              exit 1
          fi
          echo ""
          echo "=== Check headers exist in XCFramework ==="
          find Tests/VerifyLibmpv/Libmpv.xcframework -name "*.h" -exec echo "✅ Header: {}" \;
          find Tests/VerifyLibmpv/Libmpv.xcframework -name "client.h" -exec echo "✅ client.h found" \;
          if [ -z "$(find Tests/VerifyLibmpv/Libmpv.xcframework -name 'client.h')" ]; then
              echo "❌ ERROR: client.h not found in XCFramework!"
              exit 1
          fi

      - name: Create test iOS framework project
        run: |
          # 创建一个最小的 iOS SPM 项目来验证 import Libmpv
          # 关键：XCFramework 放在包根目录下（与 Package.swift 同级）
          # 这样 binaryTarget 可以使用包内相对路径，避免 SPM 跨包解析问题
          # 目录结构：
          #   Tests/VerifyLibmpv/           ← SPM 包根目录
          #     Package.swift
          #     Libmpv.xcframework/        ← binaryTarget 在包内！
          #     Sources/VerifyLibmpv/
          #       VerifyLibmpv.swift
          #     Tests/VerifyLibmpvTests/
          #       VerifyLibmpvTests.swift
          mkdir -p Tests/VerifyLibmpv/Sources/VerifyLibmpv
          mkdir -p Tests/VerifyLibmpv/Tests/VerifyLibmpvTests

          # Package.swift — binaryTarget 使用包内相对路径
          # linkerSettings: static XCFrameworks don't auto-link their system
          # framework dependencies; we must declare them explicitly here.
          # Required by libmpv's dependencies:
          #   AVFoundation  ← AVCapture*, AVMedia*, AVAudioSession
          #   AudioToolbox  ← AudioUnit*, AudioComponent*, AudioFormat*
          #   CoreMedia     ← CMAudio*, CMBlock*, CMSample*, CMVideo*
          #   bz2           ← BZ2_* (system libbz2)
          #   z             ← _deflate*, _inflate*, _compress* (zlib; used by FFmpeg/libass)
          #   iconv         ← _iconv* (used by libass subtitle charset conversion)
          sed 's/^          //' > Tests/VerifyLibmpv/Package.swift << 'PKGEOF'
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "VerifyLibmpv",
              platforms: [.iOS(.v13)],
              targets: [
                  .target(
                      name: "VerifyLibmpv",
                      dependencies: ["Libmpv"],
                      path: "Sources/VerifyLibmpv",
                      linkerSettings: [
                          .linkedFramework("AVFoundation"),
                          .linkedFramework("AudioToolbox"),
                          .linkedFramework("CoreMedia"),
                          .linkedLibrary("bz2"),
                          .linkedLibrary("z"),
                          .linkedLibrary("iconv"),
                      ]
                  ),
                  .binaryTarget(
                      name: "Libmpv",
                      path: "Libmpv.xcframework"
                  ),
                  .testTarget(
                      name: "VerifyLibmpvTests",
                      dependencies: ["VerifyLibmpv"],
                      path: "Tests/VerifyLibmpvTests"
                  )
              ]
          )
          PKGEOF

          # Swift 源文件 — import Libmpv 并调用 mpv API
          # NOTE: use 'sed' to strip the 10-space YAML indentation from each line
          # so the generated Swift file has clean, unindented source code.
          #
          # Type notes:
          #   mpv_client_api_version() → C 'unsigned long' → Swift 'UInt' (NOT Int32)
          #   mpv_initialize / mpv_set_option_string → C 'int' → Swift 'Int32'
          sed 's/^          //' > Tests/VerifyLibmpv/Sources/VerifyLibmpv/VerifyLibmpv.swift << 'SWIFTEOF'
          import Libmpv

          // mpv_client_api_version() returns C 'unsigned long' → Swift UInt
          public func verifyMPVVersion() -> UInt {
              mpv_client_api_version()
          }

          public func verifyMPVCreate() -> Bool {
              mpv_create() != nil
          }

          @available(iOS 13, *)
          public func verifyMPVLifecycle() -> Bool {
              guard let handle = mpv_create() else { return false }
              guard mpv_set_option_string(handle, "vo", "null") >= 0 else {
                  mpv_terminate_destroy(handle); return false
              }
              guard mpv_initialize(handle) >= 0 else {
                  mpv_terminate_destroy(handle); return false
              }
              mpv_terminate_destroy(handle)
              return true
          }
          SWIFTEOF

          # 测试文件
          sed 's/^          //' > Tests/VerifyLibmpv/Tests/VerifyLibmpvTests/VerifyLibmpvTests.swift << 'TESTEOF'
          import XCTest
          @testable import VerifyLibmpv

          final class LibmpvImportTests: XCTestCase {

              func testImportLibmpvResolves() {
                  print("✅ import Libmpv resolved successfully via SPM binaryTarget")
              }

              func testMPVClientAPIVersion() {
                  // verifyMPVVersion() returns UInt, so compare with UInt literal
                  let v = verifyMPVVersion()
                  XCTAssertGreaterThan(v, 0 as UInt, "mpv_client_api_version() should > 0")
              }

              func testMPVCreateHandle() {
                  XCTAssertTrue(verifyMPVCreate(), "mpv_create() should return non-null handle")
              }

              func testMPVLifecycle() {
                  if #available(iOS 13, *) {
                      XCTAssertTrue(verifyMPVLifecycle(), "full mpv lifecycle should succeed")
                  }
              }
          }
          TESTEOF

          echo "✅ Test project created"
          find Tests/VerifyLibmpv -type f | sort

      - name: Boot iOS Simulator
        run: |
          # xcodebuild test requires a booted simulator — a registered-but-not-booted
          # device shows only as a placeholder and xcodebuild cannot match it.
          #
          # Strategy:
          #   1. Try to find an existing iPhone 16 Pro and boot it.
          #   2. Fall back to creating a new one from whatever iOS runtime is available.
          #   3. Wait for the simulator to reach 'Booted' state.
          #   4. Export SIM_UDID so later steps can reference it by id= (unambiguous).

          set -e

          # Find an existing iPhone 16 Pro, or pick the newest available iPhone type
          SIM_UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          hits = []
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                      hits.append((runtime, d['udid'], d['name']))
          # prefer iPhone 16 Pro, then any iPhone, sorted by runtime descending
          hits.sort(key=lambda x: (x[2]=='iPhone 16 Pro', x[0]), reverse=True)
          if hits:
              print(hits[0][1])
          " 2>/dev/null || true)

          if [ -z "$SIM_UDID" ]; then
            echo "No existing iPhone simulator found — creating one..."
            RUNTIME=$(xcrun simctl list runtimes available | grep 'iOS' | tail -1 | grep -Eo 'com\.apple\.CoreSimulator\.SimRuntime\.[^ ]+')
            DEVTYPE=$(xcrun simctl list devicetypes | grep 'iPhone' | tail -1 | grep -Eo 'com\.apple\.CoreSimulator\.SimDeviceType\.[^ ]+')
            SIM_UDID=$(xcrun simctl create "CI_iPhone" "$DEVTYPE" "$RUNTIME")
            echo "Created simulator: $SIM_UDID"
          fi

          echo "Booting simulator: $SIM_UDID"
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true   # already booted is fine

          # Wait until the simulator reaches Booted state (timeout 120 s)
          echo "Waiting for simulator to be ready..."
          for i in $(seq 1 24); do
            STATE=$(xcrun simctl list devices | grep "$SIM_UDID" | grep -Eo '\([A-Za-z ]+\)' | tr -d '()')
            echo "  [$i] state=$STATE"
            if [ "$STATE" = "Booted" ]; then break; fi
            sleep 5
          done

          echo "SIM_UDID=$SIM_UDID" >> $GITHUB_ENV
          echo "✅ Simulator ready: $SIM_UDID"

      - name: Build test project with xcodebuild (iOS Simulator)
        run: |
          cd Tests/VerifyLibmpv

          # 先解析包依赖（便于调试）
          swift package resolve 2>&1 || true
          
          echo "=== XCFramework path check (must be inside package root) ==="
          ls -la Libmpv.xcframework || echo "❌ XCFramework not found at expected path!"
          find Libmpv.xcframework -type f 2>/dev/null | head -30 || echo "❌ No files in XCFramework!"
          
          echo "=== Resolving package dependencies ==="
          xcodebuild -resolvePackageDependencies \
            -scheme VerifyLibmpv-Package \
            -platform iOS 2>&1 || true

          # Build-only step: generic/platform=iOS Simulator does NOT require a booted
          # simulator (it compiles for the platform without launching a device).
          xcodebuild build \
            -scheme VerifyLibmpv-Package \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -skip-testing:VerifyLibmpvTests \
            ONLY_ACTIVE_ARCH=YES

          echo "✅ xcodebuild succeeded — 'import Libmpv' resolves correctly in iOS Simulator build"

      - name: Run tests on iOS Simulator
        run: |
          cd Tests/VerifyLibmpv

          # Use id= with the booted simulator UDID — unambiguous, no device-matching
          # guesswork. SIM_UDID was exported by the "Boot iOS Simulator" step.
          # -only-testing format: TargetName/ClassName
          xcodebuild test \
            -scheme VerifyLibmpv-Package \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -only-testing:VerifyLibmpvTests/LibmpvImportTests

          echo "✅ All Libmpv import tests passed on iOS Simulator"
